#:schema https://developers.openai.com/codex/config-schema.json

# Trusted project-local Agent Lab. Reload Codex or start a fresh thread after this file first lands.
[mcp_servers.agent_lab]
command = "node"
args = ["scripts/agent-lab/mcp_server.mjs"]
cwd = "."
enabled = true
startup_timeout_sec = 15
tool_timeout_sec = 120
enabled_tools = [
  "lab_open",
  "lab_close",
  "lab_reset",
  "lab_catalog",
  "lab_spawn",
  "lab_update",
  "lab_remove",
  "lab_order",
  "lab_time",
  "lab_inspect",
  "lab_camera",
  "lab_screenshot",
]
default_tools_approval_mode = "auto"

# Lab setup is ephemeral: these tools never write repository files.
[mcp_servers.agent_lab.tools.lab_catalog]
approval_mode = "auto"

[mcp_servers.agent_lab.tools.lab_inspect]
approval_mode = "auto"
