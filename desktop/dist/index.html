<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bewegungskrieg</title>
    <style>
      :root {
        color-scheme: dark;
        background: #111416;
        color: #f4efe2;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(47, 63, 54, 0.85), rgba(17, 20, 22, 0.94)),
          #111416;
      }

      h1 {
        max-width: min(760px, calc(100vw - 48px));
        margin: 0;
        font-size: clamp(2.75rem, 7vw, 5.75rem);
        line-height: 1;
        font-weight: 800;
        text-align: center;
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <h1>Bewegungskrieg shell - Phase 0</h1>
  </body>
</html>
