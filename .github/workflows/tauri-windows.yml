name: Tauri Windows

on:
  push:
    branches:
      - main
    paths:
      - "desktop/**"
      - ".github/workflows/tauri-windows.yml"
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  TAURI_CLI_VERSION: 2.11.2

jobs:
  build-windows:
    name: Build unsigned Windows NSIS installer
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo and Tauri target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-tauri-${{ env.TAURI_CLI_VERSION }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-${{ env.TAURI_CLI_VERSION }}-
            ${{ runner.os }}-tauri-

      - name: Install pinned Tauri CLI
        shell: pwsh
        run: |
          $wanted = "tauri-cli $env:TAURI_CLI_VERSION"
          $current = ""
          if (Get-Command cargo-tauri -ErrorAction SilentlyContinue) {
            $current = cargo tauri --version
          }
          if ($current -ne $wanted) {
            cargo install tauri-cli --version $env:TAURI_CLI_VERSION --locked --force
          }
          cargo tauri --version

      - name: Build Windows installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tauriScript: cargo tauri
          args: --bundles nsis --no-sign
          includeUpdaterJson: false
          releaseId: ${{ github.event_name == 'release' && github.event.release.id || '' }}

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: bewegungskrieg-windows-nsis
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
