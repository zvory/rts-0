name: Main test gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}

jobs:
  changed-files:
    name: CI / changed files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      docs_only: ${{ steps.changed-files.outputs.docs_only }}
      ci_class: ${{ steps.changed-files.outputs.ci_class }}
      run_server_build: ${{ steps.changed-files.outputs.run_server_build }}
      run_rust: ${{ steps.changed-files.outputs.run_rust }}
      run_live_node: ${{ steps.changed-files.outputs.run_live_node }}
      run_browser: ${{ steps.changed-files.outputs.run_browser }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: changed-files
        shell: bash
        run: |
          changed=()
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            while IFS= read -r path; do
              [ -n "$path" ] && changed+=("$path")
            done < <(git diff --name-only --no-renames \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}")
          elif [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [ -n "$base" ] && [[ ! "$base" =~ ^0+$ ]] && git cat-file -e "$base^{commit}" 2>/dev/null; then
              while IFS= read -r path; do
                [ -n "$path" ] && changed+=("$path")
              done < <(git diff --name-only --no-renames "$base" "$head")
            else
              printf 'Push base commit unavailable; using full CI policy.\n'
            fi
          fi

          printf 'Changed files:\n'
          if [ "${#changed[@]}" -gt 0 ]; then
            printf '  %s\n' "${changed[@]}"
          else
            printf '  <none or unavailable>\n'
          fi

          policy_output="$(node tests/select-suites.mjs --ci-policy "${changed[@]}")"
          printf '%s\n' "$policy_output" | tee -a "$GITHUB_OUTPUT"

      - name: Run docs health check
        run: node scripts/check-docs-health.mjs

      - name: Run source file size check
        run: node scripts/check-source-file-sizes.mjs

  server-build:
    name: CI / server binary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changed-files
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/server/target
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip server build
        if: needs.changed-files.outputs.run_server_build != 'true'
        run: echo "CI class '${{ needs.changed-files.outputs.ci_class }}' does not need a server binary."

      - name: Set up Rust
        if: needs.changed-files.outputs.run_server_build == 'true'
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Cache Cargo registry and target
        if: needs.changed-files.outputs.run_server_build == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache wasm-bindgen CLI
        if: needs.changed-files.outputs.run_server_build == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-bindgen
            ~/.cargo/bin/wasm-bindgen-test-runner
            ~/.cargo/bin/wasm2es6js
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-wasm-bindgen-cli-0.2.123

      - name: Install prediction WASM tooling
        if: needs.changed-files.outputs.run_server_build == 'true'
        run: |
          rustup target add wasm32-unknown-unknown
          version="$(wasm-bindgen --version 2>/dev/null || true)"
          if [ "$version" = "wasm-bindgen 0.2.123" ]; then
            printf '%s\n' "$version"
          else
            cargo install wasm-bindgen-cli --version 0.2.123 --locked
          fi

      - name: Build debug server
        if: needs.changed-files.outputs.run_server_build == 'true'
        run: cargo build --manifest-path server/Cargo.toml -p rts-server --bin rts-server

      - name: Build prediction WASM assets
        if: needs.changed-files.outputs.run_server_build == 'true'
        run: scripts/build-sim-wasm.sh

      - name: Upload server binary
        if: needs.changed-files.outputs.run_server_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rts-server-debug
          path: server/target/debug/rts-server
          if-no-files-found: error

      - name: Upload prediction WASM assets
        if: needs.changed-files.outputs.run_server_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rts-sim-wasm-assets
          path: |
            client/vendor/sim-wasm/rts_sim_wasm.js
            client/vendor/sim-wasm/rts_sim_wasm_bg.wasm
            client/vendor/sim-wasm/rts_sim_wasm.d.ts
            client/vendor/sim-wasm/rts_sim_wasm_bg.wasm.d.ts
          if-no-files-found: error

  rust-checks:
    name: CI / Rust checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changed-files
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/server/target
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip Rust checks
        if: needs.changed-files.outputs.run_rust != 'true'
        run: echo "CI class '${{ needs.changed-files.outputs.ci_class }}' does not need Rust policy or lint checks."

      - name: Set up Rust
        if: needs.changed-files.outputs.run_rust == 'true'
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Set up Node
        if: needs.changed-files.outputs.run_rust == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Cargo registry and target
        if: needs.changed-files.outputs.run_rust == 'true'
        id: rust-checks-cargo-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust policy and lint checks
        if: needs.changed-files.outputs.run_rust == 'true'
        env:
          RTS_SUITE_TIMING_DETAILS: "1"
        run: ./tests/run-all.sh --only-rust-checks

  rust-nextest:
    name: CI / Rust tests (${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changed-files
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/server/target
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip Rust nextest shard
        if: needs.changed-files.outputs.run_rust != 'true'
        run: echo "CI class '${{ needs.changed-files.outputs.ci_class }}' does not need Rust nextest."

      - name: Set up Rust
        if: needs.changed-files.outputs.run_rust == 'true'
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Set up Node
        if: needs.changed-files.outputs.run_rust == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Cargo registry and target
        if: needs.changed-files.outputs.run_rust == 'true'
        id: rust-nextest-cargo-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-nextest
        if: needs.changed-files.outputs.run_rust == 'true'
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Print Rust test context
        if: needs.changed-files.outputs.run_rust == 'true'
        shell: bash
        env:
          CARGO_CACHE_HIT: ${{ steps.rust-nextest-cargo-cache.outputs.cache-hit }}
          RTS_NEXTEST_PARTITION: "slice:${{ matrix.shard }}/2"
        run: |
          printf 'Rust test context:\n'
          printf '  CARGO_TARGET_DIR=%s\n' "$CARGO_TARGET_DIR"
          printf '  rustc: %s\n' "$(rustc --version)"
          printf '  cargo: %s\n' "$(cargo --version)"
          printf '  cargo-nextest: %s\n' "$(cargo nextest --version)"
          printf '  nextest partition: %s\n' "$RTS_NEXTEST_PARTITION"
          printf '  cargo cache exact hit: %s\n' "${CARGO_CACHE_HIT:-false}"

      - name: Run Rust nextest shard
        if: needs.changed-files.outputs.run_rust == 'true'
        env:
          RTS_NEXTEST_JUNIT_SUMMARY: "1"
          RTS_NEXTEST_PARTITION: "slice:${{ matrix.shard }}/2"
          RTS_SUITE_TIMING_DETAILS: "1"
        run: ./tests/run-all.sh --only-nextest

      - name: Upload nextest JUnit report
        if: always() && needs.changed-files.outputs.run_rust == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit-${{ matrix.shard }}
          path: server/target/nextest/default/junit.xml
          if-no-files-found: warn
          retention-days: 7

  live-node:
    name: CI / live Node suites
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - changed-files
      - server-build
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip live Node suites
        if: needs.changed-files.outputs.run_live_node != 'true'
        run: echo "CI class '${{ needs.changed-files.outputs.ci_class }}' does not need live Node suites."

      - name: Set up Node
        if: needs.changed-files.outputs.run_live_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download server binary
        if: needs.changed-files.outputs.run_live_node == 'true'
        uses: actions/download-artifact@v4
        with:
          name: rts-server-debug
          path: .ci-server

      - name: Run live Node suites
        if: needs.changed-files.outputs.run_live_node == 'true'
        env:
          CI_CLASS: ${{ needs.changed-files.outputs.ci_class }}
        run: |
          if [ "$CI_CLASS" = "client_only" ]; then
            node tests/select-suites.mjs --verify
            node scripts/check-client-architecture.mjs
          fi
          chmod +x .ci-server/rts-server
          RTS_SERVER_BIN="$PWD/.ci-server/rts-server" ./tests/run-all.sh --only-live-node

  browser-shards:
    name: CI / browser (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - changed-files
      - server-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: smoke + phase 0.5
            scenarios: smoke,phase-0.5
          - label: phases 2.5 + 5
            scenarios: phase-2.5,phase-5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip browser shard
        if: needs.changed-files.outputs.run_browser != 'true'
        run: echo "CI class '${{ needs.changed-files.outputs.ci_class }}' does not need browser suites."

      - name: Set up Node
        if: needs.changed-files.outputs.run_browser == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download server binary
        if: needs.changed-files.outputs.run_browser == 'true'
        uses: actions/download-artifact@v4
        with:
          name: rts-server-debug
          path: .ci-server

      - name: Download prediction WASM assets
        if: needs.changed-files.outputs.run_browser == 'true'
        uses: actions/download-artifact@v4
        with:
          name: rts-sim-wasm-assets
          path: client/vendor/sim-wasm

      - name: Run browser shard
        if: needs.changed-files.outputs.run_browser == 'true'
        env:
          BROWSER_SCENARIOS: ${{ matrix.scenarios }}
          CHROME: /usr/bin/google-chrome-stable
          RTS_RUN_WASM_TRI_STATE: "0"
        run: |
          chmod +x .ci-server/rts-server
          RTS_SERVER_BIN="$PWD/.ci-server/rts-server" ./tests/run-all.sh --only-browser-scenarios="$BROWSER_SCENARIOS"

  aggregate:
    name: ./tests/run-all.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - server-build
      - rust-checks
      - rust-nextest
      - live-node
      - browser-shards
    if: always()
    steps:
      - name: Verify split full gate
        env:
          SERVER_BUILD_RESULT: ${{ needs.server-build.result }}
          RUST_CHECKS_RESULT: ${{ needs.rust-checks.result }}
          RUST_NEXTEST_RESULT: ${{ needs.rust-nextest.result }}
          LIVE_NODE_RESULT: ${{ needs.live-node.result }}
          BROWSER_SHARDS_RESULT: ${{ needs.browser-shards.result }}
        shell: bash
        run: |
          printf 'Split full gate results:\n'
          printf '  server binary: %s\n' "$SERVER_BUILD_RESULT"
          printf '  rust policy and lint: %s\n' "$RUST_CHECKS_RESULT"
          printf '  rust nextest shards: %s\n' "$RUST_NEXTEST_RESULT"
          printf '  live Node suites: %s\n' "$LIVE_NODE_RESULT"
          printf '  browser shards: %s\n' "$BROWSER_SHARDS_RESULT"

          if [ "$SERVER_BUILD_RESULT" != "success" ] ||
             [ "$RUST_CHECKS_RESULT" != "success" ] ||
             [ "$RUST_NEXTEST_RESULT" != "success" ] ||
             [ "$LIVE_NODE_RESULT" != "success" ] ||
             [ "$BROWSER_SHARDS_RESULT" != "success" ]; then
            exit 1
          fi
