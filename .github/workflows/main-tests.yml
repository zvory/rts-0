name: Main test gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-all:
    name: ./tests/run-all.sh
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install headless client dependencies
        working-directory: tests
        run: npm ci

      - name: Run full local CI suite
        run: ./tests/run-all.sh
