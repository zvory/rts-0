name: Desktop release artifacts

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

env:
  TAURI_CLI_VERSION: 2.11.2
  CARGO_TARGET_DIR: target

jobs:
  macos:
    name: Build macOS .app and .dmg
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            desktop/src-tauri/target
          key: macos-tauri-${{ runner.os }}-${{ env.TAURI_CLI_VERSION }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-tauri-${{ runner.os }}-${{ env.TAURI_CLI_VERSION }}-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "${TAURI_CLI_VERSION}" --locked

      - name: Build Tauri bundles
        run: cargo tauri build --ci --no-sign

      - name: Package .app bundle
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="target/release/bundle/macos/Bewegungskrieg.app"
          test -d "${APP_PATH}"
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "target/release/bundle/macos/Bewegungskrieg.app.zip"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bewegungskrieg-macos
          if-no-files-found: error
          path: |
            desktop/src-tauri/target/release/bundle/macos/Bewegungskrieg.app.zip
            desktop/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Attach artifacts to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/macos/Bewegungskrieg.app.zip
            desktop/src-tauri/target/release/bundle/dmg/*.dmg

  windows:
    name: Build Windows .exe
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            desktop/src-tauri/target
          key: windows-tauri-${{ runner.os }}-${{ env.TAURI_CLI_VERSION }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-tauri-${{ runner.os }}-${{ env.TAURI_CLI_VERSION }}-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "$env:TAURI_CLI_VERSION" --locked

      - name: Build Tauri bundles
        run: cargo tauri build --ci --no-sign --config tauri.windows.conf.json

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bewegungskrieg-windows
          if-no-files-found: error
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

      - name: Attach artifacts to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/target/release/bundle/nsis/*.exe
