name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect docs-only PR
        id: changed-files
        if: github.event_name == 'pull_request'
        working-directory: .
        shell: bash
        run: |
          changed=()
          while IFS= read -r path; do
            [ -n "$path" ] && changed+=("$path")
          done < <(git diff --name-only --no-renames \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}")

          docs_only=true
          if [ "${#changed[@]}" -eq 0 ]; then
            docs_only=false
          else
            for path in "${changed[@]}"; do
              if [[ "$path" != *.md ]]; then
                docs_only=false
                break
              fi
            done
          fi

          printf 'docs_only=%s\n' "$docs_only" >> "$GITHUB_OUTPUT"
          printf 'Changed files:\n'
          printf '  %s\n' "${changed[@]}"

      - name: Skip Rust checks for docs-only PR
        if: github.event_name == 'pull_request' && steps.changed-files.outputs.docs_only == 'true'
        working-directory: .
        run: echo "Only Markdown files changed; Rust build, lint, and tests are not needed for this PR."

      - uses: actions/setup-node@v4
        if: github.event_name != 'pull_request' || steps.changed-files.outputs.docs_only != 'true'
        with:
          node-version: "22"

      - uses: actions/cache@v4
        if: github.event_name != 'pull_request' || steps.changed-files.outputs.docs_only != 'true'
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Crate-boundary policy is always run for Rust CI. Skipping package tests is only valid
      # when changed files map outside that package and this dependency-direction check still
      # proves no forbidden lower-to-higher edge was introduced.
      - name: Check crate boundaries
        if: github.event_name != 'pull_request' || steps.changed-files.outputs.docs_only != 'true'
        run: node ../scripts/check-crate-boundaries.mjs

      - name: Check sim architecture
        if: github.event_name != 'pull_request' || steps.changed-files.outputs.docs_only != 'true'
        run: cargo run -p rts-archcheck -- check-sim-architecture

      - name: Check test-selection policy
        if: github.event_name != 'pull_request' || steps.changed-files.outputs.docs_only != 'true'
        run: node ../tests/select-suites.mjs --verify

      - name: Build
        if: github.event_name != 'pull_request' || steps.changed-files.outputs.docs_only != 'true'
        run: cargo build

      - name: Clippy
        if: github.event_name != 'pull_request' || steps.changed-files.outputs.docs_only != 'true'
        run: cargo clippy -- -D warnings

      - name: Test
        if: github.event_name != 'pull_request' || steps.changed-files.outputs.docs_only != 'true'
        run: cargo test
