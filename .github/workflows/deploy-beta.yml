name: Deploy beta

on:
  workflow_run:
    workflows:
      - Main test gate
    types:
      - completed

concurrency:
  # Keep one active beta deploy and at most one pending replacement. This coalesces frequent
  # pushes to main without interrupting an in-flight Fly deploy/drain.
  group: beta-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy beta server
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Stage scenario PR submission secrets
        run: |
          if [ -z "${RTS_SCENARIO_PR_GITHUB_TOKEN:-}" ]; then
            echo "RTS_SCENARIO_PR_GITHUB_TOKEN is not configured; scenario PR submission remains disabled."
            exit 0
          fi
          {
            echo "RTS_SCENARIO_PR_ENABLED=1"
            echo "RTS_SCENARIO_PR_REPO=zvory/rts-0"
            echo "RTS_SCENARIO_PR_BASE_BRANCH=main"
            printf 'RTS_SCENARIO_PR_GITHUB_TOKEN=%s\n' "$RTS_SCENARIO_PR_GITHUB_TOKEN"
          } | flyctl secrets import --app "${FLY_BETA_APP:-bewegungskrieg-beta}" --stage
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_BETA_API_TOKEN }}
          RTS_SCENARIO_PR_GITHUB_TOKEN: ${{ secrets.RTS_SCENARIO_PR_GITHUB_TOKEN }}

      - name: Deploy beta
        run: ./deploy.sh beta ${{ github.event.workflow_run.head_sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_BETA_API_TOKEN }}
