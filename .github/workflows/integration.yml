name: Integration

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  integration:
    name: integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect docs-only PR
        id: changed-files
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          changed=()
          while IFS= read -r path; do
            [ -n "$path" ] && changed+=("$path")
          done < <(git diff --name-only --no-renames \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}")

          docs_only=true
          if [ "${#changed[@]}" -eq 0 ]; then
            docs_only=false
          else
            for path in "${changed[@]}"; do
              if [[ "$path" != *.md ]]; then
                docs_only=false
                break
              fi
            done
          fi

          printf 'docs_only=%s\n' "$docs_only" >> "$GITHUB_OUTPUT"
          printf 'Changed files:\n'
          printf '  %s\n' "${changed[@]}"

      - name: Skip integration checks for docs-only PR
        if: github.event_name == 'pull_request' && steps.changed-files.outputs.docs_only == 'true'
        run: echo "Only Markdown files changed; integration and JS tests are not needed for this PR."

      - uses: actions/cache@v4
        if: github.event_name != 'pull_request' || steps.changed-files.outputs.docs_only != 'true'
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - uses: actions/setup-node@v4
        if: github.event_name != 'pull_request' || steps.changed-files.outputs.docs_only != 'true'
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tests/package-lock.json

      - name: Install test dependencies
        if: github.event_name != 'pull_request' || steps.changed-files.outputs.docs_only != 'true'
        run: npm install
        working-directory: tests

      # This job intentionally skips Rust unit/lint suites because rust.yml owns them.
      # That skip is invalid if protocol, snapshot delivery, lobby, or server-shell behavior
      # changed without running the package-aware suites from docs/design/testing.md locally.
      - name: Run integration and JS tests
        if: github.event_name != 'pull_request' || steps.changed-files.outputs.docs_only != 'true'
        run: tests/run-all.sh --no-rust
        env:
          CHROME: /usr/bin/google-chrome-stable
