app = "rts-0-zvorygin"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  RTS_ADDR = "0.0.0.0:8080"
  RUST_LOG = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
