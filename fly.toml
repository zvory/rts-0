app = "rts-0-zvorygin"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[env]
  RTS_ADDR = "0.0.0.0:8080"
  RUST_LOG = "info"
  RTS_LOG_JSON = "1"
  RTS_DATADOG_METRICS = "1"
  DD_ENV = "prod"
  DD_SERVICE = "rts"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
