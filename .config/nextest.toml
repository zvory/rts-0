[profile.default]
# Keep local output compact while still surfacing per-test status and slow tests.
status-level = "pass"
final-status-level = "slow"
failure-output = "immediate-final"
success-output = "never"
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.default.junit]
path = "junit.xml"

[[profile.default.overrides]]
# This benchmark deliberately advances a dense 224-entity fight through 60
# seconds of authoritative simulation. It takes about 80 seconds alone but can
# exceed four minutes when the CI shard contends with hundreds of parallel tests.
filter = "test(supply_300_hellhole_lab_scenario_is_structurally_stable)"
threads-required = "num-test-threads"
slow-timeout = { period = "60s", terminate-after = 4 }
