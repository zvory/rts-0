<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Bewegungskrieg!</title>
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="./favicon-32.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta property="og:title" content="Bewegungskrieg!" />
    <meta property="og:description" content="War of Movement" />
    <meta property="og:image" content="/cover-art.png" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#101418" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!--
      PixiJS v7 (UMD) exposes the global `PIXI`. Loaded as a classic script so it is
      defined before the deferred ES module `main.js` runs. Pinned for reproducibility;
      upgrading to v8 (async Application.init) is a tracked future task — see README.
    -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!--
      DOM contract (pinned). JS modules query these ids/classes — keep them stable.
        Lobby:  #lobby-screen, #lobby-name, #lobby-room, #lobby-join, #lobby-players,
                #lobby-spectator, #lobby-team-preset, #lobby-team-preset-display,
                #lobby-ready, #lobby-add-ai, #lobby-quickstart, #lobby-start, #lobby-status
        Game:   #game-screen, #viewport (Pixi canvas mounts here),
                #hud, #res-steel, #res-oil, #res-supply,
                #minimap (canvas), #selection-area, #control-group-tabs,
                #selected-panel, #command-card,
                #game-menu, #settings-button, #settings-menu, #pointer-lock-toggle,
                #give-up-open, #give-up-confirm, #give-up-cancel, #give-up-confirm-button,
                #game-over, #game-over-text, #game-over-scores, #game-over-button
        App:    #toast
    -->
    <div id="app">
      <div id="version" aria-label="game version"></div>
      <details id="dev-links">
        <summary>Dev links</summary>
        <ul>
          <li class="dev-links-section">Tools</li>
          <li><a href="/dev/scenarios" target="_blank">Scenarios</a></li>
          <li><a href="/dev/selfplay" target="_blank">AI self play</a></li>
          <li><a href="/map-editor.html" target="_blank">Map editor</a></li>
          <li class="dev-links-section">Environments</li>
          <li><a href="https://rts-0-zvorygin-beta.fly.dev/" target="_blank" rel="noreferrer">Beta Version</a></li>
        </ul>
      </details>
      <div id="dev-banner" hidden></div>

      <!-- ============================ LOBBY ============================ -->
      <section id="lobby-screen" class="screen">
        <div class="lobby-box">
          <h1 class="logo">Bewegungskrieg!</h1>
          <p class="subtitle">War of Movement</p>


          <div class="lobby-form">
            <label>
              Name
              <input id="lobby-name" type="text" maxlength="16" placeholder="Commander" autocomplete="off" />
            </label>
            <label>
              Room
              <input id="lobby-room" type="text" maxlength="24" value="main" autocomplete="off" />
            </label>
            <label id="lobby-spectator" class="toggle">
              <input type="checkbox" />
              <span>Spectator</span>
            </label>
            <button id="lobby-join" class="btn primary">Join</button>
          </div>

          <div class="lobby-room" hidden>
            <h2>Players</h2>
            <div class="lobby-team-row">
              <label id="lobby-team-preset-label" for="lobby-team-preset">Teams</label>
              <select id="lobby-team-preset" disabled></select>
              <span id="lobby-team-preset-display" hidden></span>
            </div>
            <ul id="lobby-players" class="player-list"></ul>
            <div class="lobby-map-row">
              <label id="lobby-map-label" for="lobby-map">Map</label>
              <select id="lobby-map" disabled></select>
              <span id="lobby-map-display" hidden></span>
            </div>
            <div class="lobby-actions">
              <button id="lobby-ready" class="btn">Ready</button>
              <button id="lobby-add-ai" class="btn host-only" hidden>+ Add AI</button>
              <label id="lobby-quickstart" class="toggle host-only" hidden>
                <input type="checkbox" />
                <span>Debug mode</span>
              </label>
              <button id="lobby-start" class="btn primary" disabled>Start match</button>
            </div>
          </div>

          <p id="lobby-status" class="status"></p>
        </div>
        <div id="match-history-host" class="match-history"></div>
      </section>

      <section id="branch-screen" class="screen" hidden></section>

      <!-- ============================ GAME ============================= -->
      <section id="game-screen" class="screen" hidden>
        <div id="viewport"></div>

        <!-- Top resource bar -->
        <div id="hud">
          <div class="res"><span class="res-icon steel">▰</span><span id="res-steel">0</span></div>
          <div class="res"><span class="res-icon oil">⬤</span><span id="res-oil">0</span></div>
          <div class="res"><span class="res-icon supply">▲</span><span id="res-supply">0 / 0</span></div>
        </div>

        <!-- Bottom-left minimap -->
        <div id="minimap-wrap">
          <canvas id="minimap" width="242" height="242"></canvas>
        </div>

        <!-- Bottom-center selection info -->
        <div id="selection-area">
          <div id="control-group-tabs" aria-label="Control groups"></div>
          <div id="selected-panel"></div>
        </div>

        <!-- Bottom-right command card -->
        <div id="command-card"></div>

        <!-- Give-up confirmation -->
        <div id="give-up-confirm" hidden>
          <div class="give-up-box" role="dialog" aria-modal="true" aria-labelledby="give-up-title">
            <h2 id="give-up-title">Give up?</h2>
            <p>You will lose this match and go to the score screen.</p>
            <div class="give-up-actions">
              <button id="give-up-cancel" class="btn" type="button">Cancel</button>
              <button id="give-up-confirm-button" class="btn danger" type="button">Give up</button>
            </div>
          </div>
        </div>

        <!-- Replay seek + speed controls (only shown during replay dev-watch) -->
        <div id="replay-speed" hidden>
          <button class="spd-btn seek-btn" data-seek-back="2147483647" title="Restart from tick 0">⟲ Reset</button>
          <button class="spd-btn seek-btn" data-seek-back="600" title="Rewind 20 seconds">−20s</button>
          <button class="spd-btn seek-btn" data-seek-back="300" title="Rewind 10 seconds">−10s</button>
          <button class="spd-btn seek-btn" data-seek-back="150" title="Rewind 5 seconds">−5s</button>
          <button class="spd-btn dev-pause-btn" data-speed="0" title="Pause dev scenario">Pause</button>
          <button class="spd-btn dev-step-btn" data-step-dev-tick="1" title="Advance one simulation tick">Step</button>
          <span class="spd-sep"></span>
          <button class="spd-btn" data-speed="0.5">0.5×</button>
          <button class="spd-btn" data-speed="1">1×</button>
          <button class="spd-btn" data-speed="2">2×</button>
          <button class="spd-btn" data-speed="4">4×</button>
          <button class="spd-btn" data-speed="8">8×</button>
          <span id="replay-concluded" class="replay-status" hidden>Replay Concluded</span>
        </div>

        <!-- Game over overlay -->
        <div id="game-over" hidden>
          <div class="game-over-box">
            <button id="game-over-close" class="game-over-close" type="button" aria-label="Close score screen">×</button>
            <h1 id="game-over-text">Victory</h1>
            <div id="game-over-scores" class="scoreboard" hidden></div>
            <button id="game-over-button" class="btn primary">Back to lobby</button>
          </div>
        </div>
      </section>

      <!-- Transient notice toast -->
      <div id="game-menu" data-settings-context="lobby">
        <button id="settings-button" type="button" aria-label="Settings" title="Settings">⚙</button>
        <div id="settings-menu" class="hud-panel" role="dialog" aria-modal="false" aria-labelledby="settings-title" hidden></div>
      </div>
      <div id="toast" hidden></div>
    </div>

    <script type="module" src="./src/main.js"></script>
    <script>document.getElementById("app").addEventListener("contextmenu", e => e.preventDefault());</script>
  </body>
</html>
