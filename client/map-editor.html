<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bewegungskrieg Map Editor</title>
    <style>
      :root {
        --bg: #151713;
        --panel: #242820;
        --panel-2: #303629;
        --edge: #5d6651;
        --text: #e7dfc5;
        --muted: #b0aa91;
        --faint: #77715f;
        --accent: #c7d07a;
        --bad: #c86155;
        --grass: #59633f;
        --rock: #6a6659;
        --water: #2f5560;
        --grid: rgba(0, 0, 0, 0.26);
        --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 14px;
      }

      body {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        overflow: hidden;
      }

      aside {
        height: 100vh;
        overflow: auto;
        border-right: 1px solid var(--edge);
        background: var(--panel);
        padding: 18px;
      }

      main {
        min-width: 0;
        height: 100vh;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        color: var(--accent);
        font-size: 22px;
        line-height: 1.1;
      }

      h2 {
        margin-top: 22px;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      button,
      input[type="number"],
      input[type="text"],
      select {
        font: inherit;
      }

      button {
        min-height: 34px;
        border: 1px solid var(--edge);
        border-radius: 3px;
        background: var(--panel-2);
        color: var(--text);
        cursor: pointer;
      }

      button:hover {
        border-color: var(--accent);
      }

      button.active {
        border-color: var(--accent);
        box-shadow: inset 0 0 0 1px rgba(199, 208, 122, 0.38);
      }

      input[type="number"],
      input[type="text"] {
        width: 72px;
        height: 34px;
        border: 1px solid var(--edge);
        border-radius: 3px;
        background: #171a14;
        color: var(--text);
        padding: 0 8px;
      }

      select {
        height: 30px;
        border: 1px solid var(--edge);
        border-radius: 3px;
        background: #171a14;
        color: var(--text);
        padding: 0 8px;
      }

      .actions,
      .size-row,
      .map-select-row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .actions button {
        padding: 0 11px;
      }

      .map-select-row {
        margin-top: 8px;
      }

      .map-select-row label {
        display: grid;
        gap: 4px;
        width: 100%;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .map-select-row select {
        width: 100%;
      }

      .tool-grid {
        display: grid;
        gap: 8px;
      }

      .mode-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .view-tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .atlas-controls {
        display: grid;
        gap: 8px;
      }

      .atlas-controls label,
      .atlas-check {
        display: grid;
        gap: 4px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .atlas-check {
        grid-template-columns: auto 1fr;
        align-items: center;
        text-transform: none;
        font-weight: 600;
      }

      .atlas-check input {
        margin: 0;
      }

      .atlas-readout {
        min-height: 92px;
        border: 1px solid var(--edge);
        border-radius: 3px;
        background: #171a14;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11px;
        line-height: 1.45;
        padding: 8px;
      }

      .atlas-legend {
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.35;
      }

      .atlas-legend-row {
        display: grid;
        grid-template-columns: 18px 1fr;
        gap: 7px;
        align-items: center;
      }

      .legend-swatch {
        width: 18px;
        height: 12px;
        border: 1px solid rgba(255, 255, 255, 0.25);
      }

      .legend-swatch.passable {
        background: rgba(109, 184, 104, 0.42);
      }

      .legend-swatch.component {
        background: #68a2d9;
      }

      .legend-swatch.clearance {
        background: linear-gradient(90deg, rgba(180, 65, 65, 0.75), rgba(233, 219, 117, 0.75), rgba(94, 178, 112, 0.75));
      }

      .legend-swatch.region {
        background: rgba(180, 141, 214, 0.45);
      }

      .legend-swatch.portal {
        background: #f0d36a;
      }

      .legend-swatch.anchor {
        background: #f6f0d0;
      }

      .tool {
        display: grid;
        grid-template-columns: 22px 1fr;
        gap: 9px;
        align-items: center;
        padding: 7px 8px;
        text-align: left;
      }

      .swatch {
        width: 20px;
        height: 20px;
        border: 1px solid rgba(255, 255, 255, 0.25);
      }

      .swatch.grass {
        background: var(--grass);
      }

      .swatch.rock {
        background: var(--rock);
      }

      .swatch.water {
        background: var(--water);
      }

      .swatch.base {
        background:
          linear-gradient(45deg, transparent 42%, var(--accent) 42% 58%, transparent 58%),
          linear-gradient(-45deg, transparent 42%, var(--accent) 42% 58%, transparent 58%),
          #191b14;
      }

      .base-list {
        display: grid;
        gap: 6px;
      }

      .base-section {
        display: grid;
        gap: 8px;
      }

      .base-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        padding: 7px 8px;
        border: 1px solid var(--edge);
        border-radius: 3px;
        background: #1c2019;
        color: var(--text);
        cursor: pointer;
      }

      .base-row.active {
        border-color: var(--accent);
      }

      .base-row:hover {
        border-color: var(--accent);
      }

      .pair-row {
        grid-template-columns: 1fr auto;
      }

      .base-name {
        font-weight: 700;
      }

      .base-kind {
        display: block;
        color: var(--faint);
        font-family: var(--mono);
        font-size: 11px;
        margin-top: 2px;
      }

      .base-coord {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
      }

      .topbar {
        display: flex;
        gap: 14px;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--edge);
        background: #1b1e18;
        padding: 10px 14px;
      }

      #status {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
        min-width: 220px;
        text-align: right;
      }

      #status.bad {
        color: var(--bad);
      }

      .canvas-wrap {
        min-width: 0;
        min-height: 0;
        overflow: auto;
        padding: 16px;
        background:
          linear-gradient(45deg, rgba(255, 255, 255, 0.035) 25%, transparent 25% 75%, rgba(0, 0, 0, 0.08) 75%),
          linear-gradient(45deg, rgba(0, 0, 0, 0.08) 25%, transparent 25% 75%, rgba(255, 255, 255, 0.035) 75%),
          #10120f;
        background-position: 0 0, 8px 8px;
        background-size: 16px 16px;
      }

      canvas {
        display: block;
        border: 1px solid var(--edge);
        background: var(--grass);
        image-rendering: pixelated;
        cursor: crosshair;
      }

      .file-input {
        display: none;
      }

      @media (max-width: 820px) {
        body {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr);
        }

        aside {
          height: auto;
          max-height: 45vh;
          border-right: 0;
          border-bottom: 1px solid var(--edge);
        }

        main {
          height: 55vh;
        }
      }
    </style>
  </head>
  <body>
    <aside>
      <h1>Map Editor</h1>

      <h2>File</h2>
      <div class="actions">
        <button id="load-file" type="button">Load</button>
        <button id="save-file" type="button">Save JSON</button>
        <button id="save-as-file" type="button">Save As</button>
        <button id="reset-map" type="button">Reload Default</button>
        <input id="file-input" class="file-input" type="file" accept="application/json,.json" />
      </div>
      <div class="map-select-row">
        <label>
          Built-In Map
          <select id="built-in-map"></select>
        </label>
      </div>

      <h2>Map</h2>
      <div class="size-row">
        <label>
          Size
          <input id="map-size" type="number" min="24" max="160" step="1" value="126" />
        </label>
        <button id="resize-map" type="button">Resize</button>
      </div>

      <h2>View</h2>
      <div class="view-tabs" id="view-tabs">
        <button class="active" type="button" data-view="edit">Edit</button>
        <button type="button" data-view="atlas">Atlas</button>
      </div>

      <div id="atlas-panel" hidden>
        <h2>Atlas</h2>
        <div class="atlas-controls">
          <label>
            Movement
            <select id="atlas-movement"></select>
          </label>
          <label class="atlas-check" data-atlas-help="passability"><input id="atlas-passability" type="checkbox" checked /> Passability</label>
          <label class="atlas-check" data-atlas-help="components"><input id="atlas-components" type="checkbox" /> Components</label>
          <label class="atlas-check" data-atlas-help="clearance"><input id="atlas-clearance" type="checkbox" checked /> Clearance</label>
          <label class="atlas-check" data-atlas-help="regions"><input id="atlas-regions" type="checkbox" /> Regions</label>
          <label class="atlas-check" data-atlas-help="portals"><input id="atlas-portals" type="checkbox" checked /> Portals</label>
          <label class="atlas-check" data-atlas-help="anchors"><input id="atlas-anchors" type="checkbox" checked /> Anchors</label>
          <div id="atlas-readout" class="atlas-readout">Atlas data has not loaded.</div>
          <div class="atlas-legend" aria-label="Atlas legend">
            <div class="atlas-legend-row" data-atlas-help="passability"><span class="legend-swatch passable"></span><span>Passable terrain for selected movement</span></div>
            <div class="atlas-legend-row" data-atlas-help="components"><span class="legend-swatch component"></span><span>Component id color bands</span></div>
            <div class="atlas-legend-row" data-atlas-help="clearance"><span class="legend-swatch clearance"></span><span>Clearance heat: low to high</span></div>
            <div class="atlas-legend-row" data-atlas-help="regions"><span class="legend-swatch region"></span><span>Region bucket overlays</span></div>
            <div class="atlas-legend-row" data-atlas-help="portals"><span class="legend-swatch portal"></span><span>Portal center and width label</span></div>
            <div class="atlas-legend-row" data-atlas-help="anchors"><span class="legend-swatch anchor"></span><span>Semantic anchor id label</span></div>
          </div>
        </div>
      </div>

      <h2>Palette</h2>
      <div class="tool-grid" id="tools">
        <button class="tool active" type="button" data-tool="grass">
          <span class="swatch grass"></span>
          <span>Grass</span>
        </button>
        <button class="tool" type="button" data-tool="rock">
          <span class="swatch rock"></span>
          <span>Stone</span>
        </button>
        <button class="tool" type="button" data-tool="water">
          <span class="swatch water"></span>
          <span>Water</span>
        </button>
        <button class="tool" type="button" data-tool="base">
          <span class="swatch base"></span>
          <span>Base Site</span>
        </button>
      </div>

      <h2>Drag</h2>
      <div class="mode-grid" id="modes">
        <button class="active" type="button" data-mode="paint">Paint</button>
        <button type="button" data-mode="box">Box</button>
      </div>

      <h2>Spawn Layout</h2>
      <div class="base-section">
        <div id="pair-list" class="base-list"></div>
      </div>

      <h2>Sites</h2>
      <div class="base-section">
        <div id="natural-list" class="base-list"></div>
      </div>
    </aside>

    <main>
      <div class="topbar">
        <div id="map-name">default-handcrafted</div>
        <div id="status">Ready</div>
      </div>
      <div class="canvas-wrap">
        <canvas id="map-canvas" width="960" height="960"></canvas>
      </div>
    </main>

    <script>
      const TERRAIN = Object.freeze({
        grass: ".",
        rock: "#",
        water: "~",
      });
      const COLORS = Object.freeze({
        ".": "#59633f",
        "#": "#6a6659",
        "~": "#2f5560",
        grid: "rgba(0,0,0,0.22)",
        protect: "rgba(199,208,122,0.10)",
        protectEdge: "rgba(199,208,122,0.45)",
        base: "#c7d07a",
        baseText: "#151713",
        start: "#d9e18b",
        expansion: "#b7c5d9",
        pairLine: "rgba(231,223,197,0.62)",
      });
      const PROTECTION_RADIUS = 7;
      const EXPANSION_PROTECTION_RADIUS = 4;
      const NATURALS_PER_SLOT = 2;
      const MIN_SIZE = 24;
      const MAX_SIZE = 160;
      const DEFAULT_MAP_URL = "/maps/default-handcrafted.json";
      const MAP_CATALOG_URL = "/maps/catalog";
      const MAP_ATLAS_URL = "/maps/atlas";
      const FALLBACK_BUILT_IN_MAPS = Object.freeze([
        { file: "default-handcrafted.json", name: "Default", description: "4-player three-base map with safer in-base naturals plus a standardized contested natural for each spawn." },
        { file: "low-econ.json", name: "Low Econ", description: "Original lower-economy 4-player map with one natural expansion per spawn." },
        { file: "no-terrain.json", name: "No Terrain", description: "All grass map." },
      ]);
      const MAP_SCHEMA_VERSION = 2;

      const canvas = document.getElementById("map-canvas");
      const ctx = canvas.getContext("2d");
      const statusEl = document.getElementById("status");
      const mapNameEl = document.getElementById("map-name");
      const sizeInput = document.getElementById("map-size");
      const fileInput = document.getElementById("file-input");
      const builtInMapSelect = document.getElementById("built-in-map");
      const pairListEl = document.getElementById("pair-list");
      const naturalListEl = document.getElementById("natural-list");
      const atlasPanelEl = document.getElementById("atlas-panel");
      const atlasMovementEl = document.getElementById("atlas-movement");
      const atlasReadoutEl = document.getElementById("atlas-readout");
      const atlasLayerInputs = {
        passability: document.getElementById("atlas-passability"),
        components: document.getElementById("atlas-components"),
        clearance: document.getElementById("atlas-clearance"),
        regions: document.getElementById("atlas-regions"),
        portals: document.getElementById("atlas-portals"),
        anchors: document.getElementById("atlas-anchors"),
      };
      const atlasHelpText = {
        passability: "Passability\nWhether each terrain tile can be crossed by the selected movement class.",
        components: "Components\nConnected passable areas. Tiles in different components cannot reach each other without changing movement rules.",
        clearance: "Clearance\nDistance from blocked terrain or the map edge. Higher values mean wider, safer-feeling space for routes.",
        regions: "Regions\nCoarse buckets of nearby passable tiles inside a component. They compress raw terrain into named areas the AI can reason about.",
        portals: "Portals\nConnections between adjacent regions. A portal records the crossing center, the two region ids, movement class, and approximate width.",
        anchors: "Anchors\nStrategic map points attached to topology: starts, mains, naturals, resource clusters, and resource-line approaches.",
      };

      let map = fallbackMap();
      let activeView = "edit";
      let atlasData = null;
      let atlasLoadingFor = "";
      let atlasHoverTile = null;
      let atlasHelpKey = "";
      let selectedTool = "grass";
      let selectedMode = "paint";
      let selectedSiteId = map.sites[0].id;
      let selectedLayoutId = map.layouts[0].id;
      let pointerDown = false;
      let dragStartTile = null;
      let dragPreviewTile = null;
      let cellSize = 10;
      let builtInMaps = FALLBACK_BUILT_IN_MAPS.slice();
      let currentBuiltInFile = "default-handcrafted.json";

      function cloneSite(site) {
        return { id: site.id, kind: site.kind, x: site.x, y: site.y };
      }

      function cloneLayout(layout) {
        return {
          id: layout.id,
          playerCount: layout.playerCount,
          slots: layout.slots.map(function (slot) {
            return { main: slot.main, naturals: slot.naturals.slice() };
          }),
        };
      }

      function fallbackMap() {
        return normalizeMap({
          version: MAP_SCHEMA_VERSION,
          name: "blank-handcrafted",
          description: "",
          _design: "",
          terrain: Array.from({ length: 126 }, function () { return ".".repeat(126); }),
          sites: [
            { id: "main_nw", kind: "main", x: 25, y: 25 },
            { id: "main_se", kind: "main", x: 100, y: 100 },
            { id: "main_ne", kind: "main", x: 100, y: 25 },
            { id: "main_sw", kind: "main", x: 25, y: 100 },
            { id: "nat_top", kind: "natural", x: 63, y: 38 },
            { id: "nat_bottom", kind: "natural", x: 63, y: 88 },
            { id: "nat_right", kind: "natural", x: 88, y: 62 },
            { id: "nat_left", kind: "natural", x: 38, y: 62 },
          ],
          layouts: [
            {
              id: "4p_all",
              playerCount: 4,
              slots: [
                { main: "main_nw", naturals: ["nat_top"] },
                { main: "main_se", naturals: ["nat_bottom"] },
                { main: "main_ne", naturals: ["nat_right"] },
                { main: "main_sw", naturals: ["nat_left"] },
              ],
            },
          ],
        });
      }

      function mains() {
        return map.sites.filter(function (site) { return site.kind === "main"; });
      }

      function naturals() {
        return map.sites.filter(function (site) { return site.kind === "natural"; });
      }

      function siteById(id) {
        return map.sites.find(function (site) { return site.id === id; }) || null;
      }

      function currentLayout() {
        return map.layouts.find(function (layout) { return layout.id === selectedLayoutId; }) || map.layouts[0] || null;
      }

      function siteRadius(site) {
        return site.kind === "natural" ? EXPANSION_PROTECTION_RADIUS : PROTECTION_RADIUS;
      }

      function selectSite(id) {
        selectedSiteId = id;
        selectedTool = "base";
        syncToolButtons();
        refresh();
      }

      function setSelectedSite(tile) {
        const site = siteById(selectedSiteId);
        if (!site) return;
        site.x = tile.x;
        site.y = tile.y;
      }

      function normalizeId(value, fallback) {
        const id = String(value || "").trim().toLowerCase().replace(/[^a-z0-9_]+/g, "_").replace(/^_+|_+$/g, "");
        return id || fallback;
      }

      function normalizeMap(raw) {
        const version = Number.isInteger(raw.version) ? raw.version : 0;
        if (version !== MAP_SCHEMA_VERSION) {
          throw new Error("map schema version " + version + " is not supported; editor requires version " + MAP_SCHEMA_VERSION);
        }
        const name = String(raw.name || "handcrafted-map");
        const description = String(raw.description || "");
        const design = String(raw._design || "");
        const rows = Array.isArray(raw.terrain) ? raw.terrain.map(String) : [];
        if (!rows.length) throw new Error("terrain must contain rows");
        const size = rows[0].length;
        if (size < MIN_SIZE || size > MAX_SIZE) throw new Error("size must be between " + MIN_SIZE + " and " + MAX_SIZE);
        if (rows.length !== size) throw new Error("terrain must be square");
        for (const pair of rows.entries()) {
          const y = pair[0];
          const row = pair[1];
          if (row.length !== size) throw new Error("row " + y + " has the wrong width");
          for (const ch of row) {
            if (ch !== "." && ch !== "#" && ch !== "~") throw new Error("unknown terrain character " + ch);
          }
        }
        if (!Array.isArray(raw.sites) || raw.sites.length === 0) throw new Error("sites must contain entries");
        const seenIds = new Set();
        const seenCoords = new Set();
        const sites = raw.sites.map(function (site, i) {
          const id = normalizeId(site.id, "site_" + (i + 1));
          const kind = site.kind === "natural" ? "natural" : site.kind === "main" ? "main" : null;
          const x = Number(site.x);
          const y = Number(site.y);
          if (!kind) throw new Error("sites[" + i + "] kind must be main or natural");
          if (seenIds.has(id)) throw new Error("duplicate site id " + id);
          seenIds.add(id);
          const key = x + "," + y;
          if (seenCoords.has(key)) throw new Error("duplicate site coordinate " + key);
          seenCoords.add(key);
          if (!Number.isInteger(x) || !Number.isInteger(y)) throw new Error("sites[" + i + "] must use integer coordinates");
          if (x < 0 || y < 0 || x >= size || y >= size) throw new Error("sites[" + i + "] is outside the map");
          return { id: id, kind: kind, x: x, y: y };
        });
        const mainIds = new Set(sites.filter(function (site) { return site.kind === "main"; }).map(function (site) { return site.id; }));
        const naturalIds = new Set(sites.filter(function (site) { return site.kind === "natural"; }).map(function (site) { return site.id; }));
        if (!mainIds.size || !naturalIds.size) throw new Error("map needs at least one main and one natural site");
        if (!Array.isArray(raw.layouts) || raw.layouts.length === 0) throw new Error("layouts must contain entries");
        const seenLayouts = new Set();
        const layouts = raw.layouts.map(function (layout, i) {
          const id = normalizeId(layout.id, "layout_" + (i + 1));
          if (seenLayouts.has(id)) throw new Error("duplicate layout id " + id);
          seenLayouts.add(id);
          const playerCount = Number(layout.playerCount);
          if (!Number.isInteger(playerCount) || playerCount < 1) throw new Error("layout " + id + " has invalid playerCount");
          const slots = Array.isArray(layout.slots) ? layout.slots.map(function (slot, slotIndex) {
            if (!mainIds.has(slot.main)) throw new Error("layout " + id + " slot " + slotIndex + " references missing main " + slot.main);
            const slotNaturals = normalizeSlotNaturals(slot, "layout " + id + " slot " + slotIndex);
            for (const natural of slotNaturals) {
              if (!naturalIds.has(natural)) throw new Error("layout " + id + " slot " + slotIndex + " references missing natural " + natural);
            }
            return { main: slot.main, naturals: slotNaturals };
          }) : [];
          if (slots.length !== playerCount) throw new Error("layout " + id + " slot count must match playerCount");
          validateUniqueSlots(id, slots);
          return { id: id, playerCount: playerCount, slots: slots };
        });
        return { version: version, name: name, description: description, _design: design, terrain: rows, sites: sites, layouts: layouts };
      }

      function normalizeSlotNaturals(slot, label) {
        const raw = Array.isArray(slot.naturals) ? slot.naturals : slot.natural ? [slot.natural] : [];
        const out = [];
        const seen = new Set();
        for (const value of raw) {
          const id = String(value || "").trim();
          if (!id) continue;
          if (seen.has(id)) throw new Error(label + " repeats natural " + id);
          seen.add(id);
          out.push(id);
        }
        if (!out.length) throw new Error(label + " needs at least one natural");
        if (out.length > NATURALS_PER_SLOT) throw new Error(label + " supports at most " + NATURALS_PER_SLOT + " naturals");
        return out;
      }

      function validateUniqueSlots(layoutId, slots) {
        const usedMains = new Set();
        const usedNaturals = new Set();
        for (const slot of slots) {
          if (usedMains.has(slot.main)) throw new Error("layout " + layoutId + " assigns main " + slot.main + " more than once");
          usedMains.add(slot.main);
          for (const natural of slot.naturals) {
            if (usedNaturals.has(natural)) throw new Error("layout " + layoutId + " assigns natural " + natural + " more than once");
            usedNaturals.add(natural);
          }
        }
      }

      function setStatus(text, bad) {
        statusEl.textContent = text;
        statusEl.classList.toggle("bad", !!bad);
      }

      function renderBuiltInMapSelect() {
        builtInMapSelect.replaceChildren();
        for (const entry of builtInMaps) {
          const opt = document.createElement("option");
          opt.value = entry.file;
          opt.textContent = entry.name;
          opt.title = entry.description || entry.name;
          builtInMapSelect.appendChild(opt);
        }
        builtInMapSelect.value = currentBuiltInFile;
      }

      async function loadMapUrl(url, label) {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error("HTTP " + response.status);
        map = normalizeMap(await response.json());
        selectedSiteId = map.sites[0].id;
        selectedLayoutId = map.layouts[0].id;
        atlasData = null;
        atlasHoverTile = null;
        map.sites.forEach(clearProtectedArea);
        refresh();
        setStatus("loaded " + label);
        if (activeView === "atlas") loadAtlasDiagnostics();
      }

      async function loadBuiltInMap(file) {
        const entry = builtInMaps.find(function (mapEntry) { return mapEntry.file === file; }) || null;
        currentBuiltInFile = file;
        renderBuiltInMapSelect();
        try {
          await loadMapUrl("/maps/" + encodeURIComponent(file), entry ? entry.name : file);
        } catch (err) {
          setStatus("map fetch failed: " + err.message, true);
        }
      }

      async function loadMapCatalog() {
        try {
          const response = await fetch(MAP_CATALOG_URL, { cache: "no-store" });
          if (!response.ok) throw new Error("HTTP " + response.status);
          const data = await response.json();
          const maps = Array.isArray(data.maps) ? data.maps.filter(function (entry) {
            return entry && typeof entry.file === "string" && entry.file.endsWith(".json");
          }) : [];
          if (maps.length) builtInMaps = maps;
        } catch (err) {
          setStatus("map catalog unavailable; using fallback list", true);
        }
        renderBuiltInMapSelect();
      }

      async function loadAtlasDiagnostics() {
        const key = map.name + "|4|0";
        atlasLoadingFor = key;
        atlasReadoutEl.textContent = "Loading atlas for " + map.name + "...";
        try {
          const url = MAP_ATLAS_URL + "?map=" + encodeURIComponent(map.name) + "&playerCount=4&seed=0";
          const response = await fetch(url, { cache: "no-store" });
          if (!response.ok) throw new Error("HTTP " + response.status + " " + await response.text());
          const data = await response.json();
          if (atlasLoadingFor !== key) return;
          atlasData = data && data.atlas ? data.atlas : null;
          syncAtlasMovementOptions();
          refresh();
          setStatus("atlas loaded for " + map.name);
        } catch (err) {
          if (atlasLoadingFor !== key) return;
          atlasData = null;
          atlasReadoutEl.textContent = "Atlas unavailable: " + err.message;
          draw();
          setStatus("atlas unavailable: " + err.message, true);
        }
      }

      function syncAtlasMovementOptions() {
        const classes = atlasData && Array.isArray(atlasData.movementClasses) ? atlasData.movementClasses : [];
        const previous = atlasMovementEl.value;
        atlasMovementEl.replaceChildren();
        for (const movementClass of classes) {
          const opt = document.createElement("option");
          opt.value = movementClass;
          opt.textContent = movementClass;
          atlasMovementEl.appendChild(opt);
        }
        if (classes.includes(previous)) atlasMovementEl.value = previous;
      }

      function selectedAtlasLayer() {
        if (!atlasData || !Array.isArray(atlasData.layers)) return null;
        const movementClass = atlasMovementEl.value || (atlasData.movementClasses && atlasData.movementClasses[0]);
        return atlasData.layers.find(function (layer) { return layer.movementClass === movementClass; }) || atlasData.layers[0] || null;
      }

      function atlasTileIndex(x, y) {
        return y * map.terrain.length + x;
      }

      function tileFromAtlas(value) {
        if (!value) return null;
        if (Array.isArray(value)) return { x: Number(value[0]), y: Number(value[1]) };
        return { x: Number(value.x), y: Number(value.y) };
      }

      function terrainAt(x, y) {
        return map.terrain[y][x];
      }

      function setTerrainAt(x, y, ch) {
        const row = map.terrain[y];
        map.terrain[y] = row.slice(0, x) + ch + row.slice(x + 1);
      }

      function isProtected(x, y) {
        return map.sites.some(function (site) {
          const r = siteRadius(site);
          return Math.abs(site.x - x) <= r && Math.abs(site.y - y) <= r;
        });
      }

      function clearProtectedArea(site) {
        const r = siteRadius(site);
        for (let y = site.y - r; y <= site.y + r; y++) {
          for (let x = site.x - r; x <= site.x + r; x++) {
            if (x >= 0 && y >= 0 && x < map.terrain.length && y < map.terrain.length) setTerrainAt(x, y, TERRAIN.grass);
          }
        }
      }

      function validationErrors() {
        const errors = [];
        const size = map.terrain.length;
        const seenCoords = new Set();
        for (const site of map.sites) {
          const key = site.x + "," + site.y;
          if (seenCoords.has(key)) errors.push("duplicate site coordinate " + key);
          seenCoords.add(key);
          const r = siteRadius(site);
          if (site.x < r || site.y < r || site.x >= size - r || site.y >= size - r) errors.push(site.id + " too close to edge");
          for (let y = site.y - r; y <= site.y + r; y++) {
            for (let x = site.x - r; x <= site.x + r; x++) {
              if (x < 0 || y < 0 || x >= size || y >= size) continue;
              if (terrainAt(x, y) !== TERRAIN.grass) {
                errors.push(site.id + " protected zone blocked");
                y = site.y + r + 1;
                break;
              }
            }
          }
        }
        const mainIds = new Set(mains().map(function (site) { return site.id; }));
        const naturalIds = new Set(naturals().map(function (site) { return site.id; }));
        for (const layout of map.layouts) {
          if (layout.slots.length !== layout.playerCount) errors.push(layout.id + " slot count mismatch");
          const usedMains = new Set();
          const usedNaturals = new Set();
          for (const slot of layout.slots) {
            if (!mainIds.has(slot.main)) errors.push(layout.id + " missing main " + slot.main);
            if (usedMains.has(slot.main)) errors.push(layout.id + " repeats main " + slot.main);
            usedMains.add(slot.main);
            if (!Array.isArray(slot.naturals) || slot.naturals.length < 1) errors.push(layout.id + " slot missing natural");
            if (slot.naturals.length > NATURALS_PER_SLOT) errors.push(layout.id + " slot has too many naturals");
            for (const natural of slot.naturals) {
              if (!naturalIds.has(natural)) errors.push(layout.id + " missing natural " + natural);
              if (usedNaturals.has(natural)) errors.push(layout.id + " repeats natural " + natural);
              usedNaturals.add(natural);
            }
          }
        }
        return errors;
      }

      function updateStatus() {
        const errors = validationErrors();
        setStatus(errors.length ? errors[0] : map.terrain.length + "x" + map.terrain.length + " valid", errors.length > 0);
      }

      function atlasColor(id, alpha) {
        const hue = (Number(id || 0) * 47) % 360;
        return "hsla(" + hue + ", 62%, 56%, " + alpha + ")";
      }

      function drawAtlasTileLayer(layer, values, colorForValue) {
        const size = map.terrain.length;
        for (let y = 0; y < size; y++) {
          for (let x = 0; x < size; x++) {
            const idx = atlasTileIndex(x, y);
            const value = values[idx];
            const color = colorForValue(value, idx);
            if (!color) continue;
            ctx.fillStyle = color;
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
          }
        }
      }

      function drawAtlasRegions(layer) {
        if (!Array.isArray(layer.regions)) return;
        for (const region of layer.regions) {
          const min = tileFromAtlas(region.minTile);
          const max = tileFromAtlas(region.maxTile);
          if (!min || !max) continue;
          ctx.strokeStyle = atlasColor(region.id, 0.9);
          ctx.lineWidth = 2;
          ctx.strokeRect(
            min.x * cellSize + 1,
            min.y * cellSize + 1,
            (max.x - min.x + 1) * cellSize - 2,
            (max.y - min.y + 1) * cellSize - 2,
          );
          ctx.fillStyle = atlasColor(region.id, 0.12);
          ctx.fillRect(
            min.x * cellSize,
            min.y * cellSize,
            (max.x - min.x + 1) * cellSize,
            (max.y - min.y + 1) * cellSize,
          );
        }
      }

      function drawAtlasPortals(layer) {
        if (!Array.isArray(layer.portals)) return;
        ctx.font = "700 " + Math.max(9, Math.floor(cellSize * 0.8)) + "px " + getComputedStyle(document.body).fontFamily;
        ctx.textAlign = "center";
        ctx.textBaseline = "bottom";
        for (const portal of layer.portals) {
          const tile = tileFromAtlas(portal.centerTile);
          if (!tile) continue;
          const cx = tile.x * cellSize + cellSize / 2;
          const cy = tile.y * cellSize + cellSize / 2;
          const radius = Math.max(4, Math.min(14, portal.widthTiles * cellSize * 0.18));
          ctx.fillStyle = "rgba(240, 211, 106, 0.85)";
          ctx.strokeStyle = "#171a14";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(cx, cy, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#f6f0d0";
          ctx.fillText("P" + portal.id + "/" + portal.widthTiles, cx, cy - radius - 2);
        }
      }

      function drawAtlasAnchors() {
        if (!atlasData || !Array.isArray(atlasData.anchors)) return;
        const movementClass = atlasMovementEl.value;
        ctx.font = "700 " + Math.max(9, Math.floor(cellSize * 0.75)) + "px " + getComputedStyle(document.body).fontFamily;
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        for (const anchor of atlasData.anchors) {
          if (anchor.movementClass !== movementClass) continue;
          const tile = tileFromAtlas(anchor.tile);
          if (!tile) continue;
          const cx = tile.x * cellSize + cellSize / 2;
          const cy = tile.y * cellSize + cellSize / 2;
          ctx.fillStyle = anchor.kind === "resourceLineApproach" ? "#f0d36a" : "#f6f0d0";
          ctx.strokeStyle = "#171a14";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.rect(cx - 4, cy - 4, 8, 8);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#f6f0d0";
          ctx.fillText(anchor.id, cx + 6, cy);
        }
      }

      function drawAtlasOverlay() {
        const layer = selectedAtlasLayer();
        if (!layer) {
          if (activeView === "atlas") atlasReadoutEl.textContent = "Atlas data has not loaded.";
          return;
        }
        if (atlasLayerInputs.passability.checked) {
          drawAtlasTileLayer(layer, layer.passableTiles || [], function (passable) {
            return passable ? "rgba(109, 184, 104, 0.24)" : "rgba(25, 25, 25, 0.38)";
          });
        }
        if (atlasLayerInputs.components.checked) {
          drawAtlasTileLayer(layer, layer.componentByTile || [], function (componentId) {
            return componentId == null ? null : atlasColor(componentId, 0.28);
          });
        }
        if (atlasLayerInputs.clearance.checked) {
          const clearances = layer.clearanceTiles || [];
          const maxClearance = Math.max(1, clearances.reduce(function (max, value) { return Math.max(max, Number(value) || 0); }, 0));
          drawAtlasTileLayer(layer, clearances, function (clearance, idx) {
            if (!(layer.passableTiles || [])[idx]) return null;
            const t = Math.min(1, (Number(clearance) || 0) / maxClearance);
            const red = Math.round(190 - t * 95);
            const green = Math.round(70 + t * 120);
            return "rgba(" + red + "," + green + ",82,0.34)";
          });
        }
        if (atlasLayerInputs.regions.checked) drawAtlasRegions(layer);
        if (atlasLayerInputs.portals.checked) drawAtlasPortals(layer);
        if (atlasLayerInputs.anchors.checked) drawAtlasAnchors();
        updateAtlasReadout();
      }

      function atlasHelpStats(layer) {
        if (!layer || !atlasData) return "";
        return "\n\nCurrent " + layer.movementClass + " layer: " +
          layer.components.length + " components, " +
          layer.regions.length + " regions, " +
          layer.portals.length + " portals, " +
          atlasData.anchors.filter(function (anchor) { return anchor.movementClass === layer.movementClass; }).length + " anchors.";
      }

      function updateAtlasReadout() {
        if (activeView !== "atlas") return;
        const layer = selectedAtlasLayer();
        if (!layer) {
          atlasReadoutEl.textContent = "Atlas data has not loaded.";
          return;
        }
        if (atlasHelpKey && atlasHelpText[atlasHelpKey]) {
          atlasReadoutEl.textContent = atlasHelpText[atlasHelpKey] + atlasHelpStats(layer);
          return;
        }
        if (!atlasHoverTile) {
          atlasReadoutEl.textContent =
            "Map: " + map.name + "\n" +
            "Movement: " + layer.movementClass + "\n" +
            "Components: " + layer.components.length + "\n" +
            "Regions: " + layer.regions.length + "\n" +
            "Portals: " + layer.portals.length + "\n" +
            "Anchors: " + atlasData.anchors.filter(function (anchor) { return anchor.movementClass === layer.movementClass; }).length;
          return;
        }
        const idx = atlasTileIndex(atlasHoverTile.x, atlasHoverTile.y);
        const anchors = atlasData.anchors.filter(function (anchor) {
          const tile = tileFromAtlas(anchor.tile);
          return anchor.movementClass === layer.movementClass && tile && tile.x === atlasHoverTile.x && tile.y === atlasHoverTile.y;
        });
        const portals = layer.portals.filter(function (portal) {
          const tile = tileFromAtlas(portal.centerTile);
          return tile && tile.x === atlasHoverTile.x && tile.y === atlasHoverTile.y;
        });
        atlasReadoutEl.textContent =
          "Tile: " + atlasHoverTile.x + "," + atlasHoverTile.y + "\n" +
          "Movement: " + layer.movementClass + "\n" +
          "Passable: " + String(!!(layer.passableTiles || [])[idx]) + "\n" +
          "Clearance: " + ((layer.clearanceTiles || [])[idx] ?? 0) + "\n" +
          "Component: " + ((layer.componentByTile || [])[idx] ?? "none") + "\n" +
          "Region: " + ((layer.regionByTile || [])[idx] ?? "none") + " - coarse topology area\n" +
          "Portals: " + (portals.map(function (portal) { return "P" + portal.id + " w" + portal.widthTiles + " r" + portal.fromRegion + "->" + portal.toRegion; }).join(", ") || "none") + " - region crossings\n" +
          "Anchors: " + (anchors.map(function (anchor) { return anchor.id + " c" + anchor.componentId + " r" + anchor.regionId; }).join(", ") || "none") + " - strategic points";
      }

      function draw() {
        const size = map.terrain.length;
        cellSize = Math.max(6, Math.min(12, Math.floor(920 / size)));
        canvas.width = size * cellSize;
        canvas.height = size * cellSize;

        for (let y = 0; y < size; y++) {
          for (let x = 0; x < size; x++) {
            ctx.fillStyle = COLORS[terrainAt(x, y)];
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
          }
        }

        ctx.strokeStyle = COLORS.grid;
        ctx.lineWidth = 1;
        for (let i = 0; i <= size; i++) {
          const p = i * cellSize + 0.5;
          ctx.beginPath();
          ctx.moveTo(p, 0);
          ctx.lineTo(p, canvas.height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, p);
          ctx.lineTo(canvas.width, p);
          ctx.stroke();
        }

        for (const site of map.sites) {
          const r = siteRadius(site);
          const x = (site.x - r) * cellSize;
          const y = (site.y - r) * cellSize;
          const w = (r * 2 + 1) * cellSize;
          ctx.fillStyle = COLORS.protect;
          ctx.fillRect(x, y, w, w);
          ctx.strokeStyle = COLORS.protectEdge;
          ctx.strokeRect(x + 0.5, y + 0.5, w - 1, w - 1);
        }

        const layout = currentLayout();
        if (layout) {
          ctx.strokeStyle = COLORS.pairLine;
          ctx.lineWidth = 2;
          for (const slot of layout.slots) {
            const main = siteById(slot.main);
            if (!main) continue;
            for (const naturalId of slot.naturals) {
              const natural = siteById(naturalId);
              if (!natural) continue;
              ctx.beginPath();
              ctx.moveTo(main.x * cellSize + cellSize / 2, main.y * cellSize + cellSize / 2);
              ctx.lineTo(natural.x * cellSize + cellSize / 2, natural.y * cellSize + cellSize / 2);
              ctx.stroke();
            }
          }
        }

        const mainIds = mains().map(function (site) { return site.id; });
        const naturalIds = naturals().map(function (site) { return site.id; });
        for (const site of map.sites) {
          const cx = site.x * cellSize + cellSize / 2;
          const cy = site.y * cellSize + cellSize / 2;
          const radius = Math.max(5, cellSize * 0.58);
          const isMain = site.kind === "main";
          const index = (isMain ? mainIds : naturalIds).indexOf(site.id) + 1;
          ctx.fillStyle = isMain ? COLORS.start : COLORS.expansion;
          ctx.strokeStyle = site.id === selectedSiteId ? "#ffffff" : "#11110f";
          ctx.lineWidth = site.id === selectedSiteId ? 3 : 2;
          ctx.beginPath();
          ctx.arc(cx, cy, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = COLORS.baseText;
          ctx.font = "700 " + Math.max(10, Math.floor(cellSize * 0.95)) + "px " + getComputedStyle(document.body).fontFamily;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText((isMain ? "M" : "N") + index, cx, cy + 0.5);
        }

        if (pointerDown && selectedMode === "box" && selectedTool !== "base" && dragStartTile && dragPreviewTile) {
          const rect = tileRect(dragStartTile, dragPreviewTile);
          ctx.fillStyle = "rgba(199,208,122,0.12)";
          ctx.fillRect(rect.x0 * cellSize, rect.y0 * cellSize, rect.w * cellSize, rect.h * cellSize);
          ctx.strokeStyle = "#e7dfc5";
          ctx.lineWidth = 2;
          ctx.strokeRect(rect.x0 * cellSize + 1, rect.y0 * cellSize + 1, rect.w * cellSize - 2, rect.h * cellSize - 2);
        }

        if (activeView === "atlas") drawAtlasOverlay();
      }

      function renderBaseList() {
        pairListEl.replaceChildren();
        naturalListEl.replaceChildren();
        const layout = currentLayout();
        const layoutSelect = document.createElement("select");
        layoutSelect.setAttribute("aria-label", "Spawn layout");
        for (const entry of map.layouts) {
          const opt = document.createElement("option");
          opt.value = entry.id;
          opt.textContent = entry.id + " (" + entry.playerCount + "p)";
          layoutSelect.appendChild(opt);
        }
        layoutSelect.value = layout ? layout.id : "";
        layoutSelect.addEventListener("change", function (event) {
          selectedLayoutId = event.target.value;
          refresh();
        });
        pairListEl.appendChild(layoutSelect);

        if (layout) {
          layout.slots.forEach(function (slot, i) {
            const row = document.createElement("div");
            row.className = "base-row pair-row";
            const mainOptions = mains().map(function (site) {
              return '<option value="' + site.id + '"' + (slot.main === site.id ? ' selected' : '') + '>' + site.id + '</option>';
            }).join("");
            const naturalSummary = slot.naturals.join(", ");
            const naturalSelects = Array.from({ length: NATURALS_PER_SLOT }, function (_, naturalIndex) {
              const selected = slot.naturals[naturalIndex] || "";
              const blank = naturalIndex === 0 ? "" : '<option value="">None</option>';
              const options = naturals().map(function (site) {
                return '<option value="' + site.id + '"' + (selected === site.id ? ' selected' : '') + '>' + site.id + '</option>';
              }).join("");
              return '<select aria-label="Natural ' + (naturalIndex + 1) + ' for slot ' + (i + 1) + '" data-natural-index="' + naturalIndex + '">' + blank + options + '</select>';
            }).join("");
            row.innerHTML = '<span><span class="base-name">Slot ' + (i + 1) + '</span><span class="base-kind">' + slot.main + ' -> ' + naturalSummary + '</span></span><span><select aria-label="Main for slot ' + (i + 1) + '">' + mainOptions + '</select>' + naturalSelects + '</span>';
            const selects = row.querySelectorAll("select");
            selects[0].addEventListener("change", function (event) { slot.main = event.target.value; refresh(); });
            selects.forEach(function (select, selectIndex) {
              if (selectIndex === 0) return;
              select.addEventListener("change", function (event) {
                const next = slot.naturals.slice();
                const naturalIndex = Number(event.target.dataset.naturalIndex);
                if (event.target.value) next[naturalIndex] = event.target.value; else next.splice(naturalIndex, 1);
                slot.naturals = next.filter(function (value, index, values) {
                  return value && values.indexOf(value) === index;
                });
                refresh();
              });
            });
            pairListEl.appendChild(row);
          });
        }

        map.sites.forEach(function (site) {
          const row = document.createElement("button");
          row.type = "button";
          row.className = "base-row" + (selectedSiteId === site.id ? " active" : "");
          row.innerHTML = '<span><span class="base-name">' + site.id + '</span><span class="base-kind">' + site.kind + '</span></span><span class="base-coord">' + site.x + ',' + site.y + '</span>';
          row.addEventListener("click", function () { selectSite(site.id); });
          naturalListEl.appendChild(row);
        });
      }

      function refresh() {
        mapNameEl.textContent = map.name;
        sizeInput.value = String(map.terrain.length);
        if (!siteById(selectedSiteId) && map.sites[0]) selectedSiteId = map.sites[0].id;
        if (!currentLayout() && map.layouts[0]) selectedLayoutId = map.layouts[0].id;
        renderBaseList();
        syncViewTabs();
        draw();
        updateStatus();
      }

      function syncViewTabs() {
        document.querySelectorAll("[data-view]").forEach(function (button) {
          button.classList.toggle("active", button.dataset.view === activeView);
        });
        atlasPanelEl.hidden = activeView !== "atlas";
        canvas.style.cursor = activeView === "atlas" ? "help" : "crosshair";
      }

      function syncToolButtons() {
        document.querySelectorAll("[data-tool]").forEach(function (button) {
          button.classList.toggle("active", button.dataset.tool === selectedTool);
        });
      }

      function syncModeButtons() {
        document.querySelectorAll("[data-mode]").forEach(function (button) {
          button.classList.toggle("active", button.dataset.mode === selectedMode);
        });
      }

      function canvasTile(event) {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((event.clientX - rect.left) / cellSize);
        const y = Math.floor((event.clientY - rect.top) / cellSize);
        const size = map.terrain.length;
        if (x < 0 || y < 0 || x >= size || y >= size) return null;
        return { x: x, y: y };
      }

      function tileRect(a, b) {
        const x0 = Math.min(a.x, b.x);
        const y0 = Math.min(a.y, b.y);
        const x1 = Math.max(a.x, b.x);
        const y1 = Math.max(a.y, b.y);
        return { x0: x0, y0: y0, x1: x1, y1: y1, w: x1 - x0 + 1, h: y1 - y0 + 1 };
      }

      function applyTool(tile) {
        if (!tile || activeView !== "edit") return;
        if (selectedTool === "base") {
          setSelectedSite(tile);
          const site = siteById(selectedSiteId);
          if (site) clearProtectedArea(site);
          refresh();
          return;
        }
        const ch = TERRAIN[selectedTool];
        if (!ch) return;
        if (ch !== TERRAIN.grass && isProtected(tile.x, tile.y)) {
          setStatus("protected base zones must stay grass", true);
          return;
        }
        setTerrainAt(tile.x, tile.y, ch);
        draw();
        updateStatus();
      }

      function applyBox(a, b) {
        if (!a || !b || selectedTool === "base" || activeView !== "edit") return;
        const ch = TERRAIN[selectedTool];
        if (!ch) return;
        const rect = tileRect(a, b);
        let skipped = 0;
        for (let y = rect.y0; y <= rect.y1; y++) {
          for (let x = rect.x0; x <= rect.x1; x++) {
            if (ch !== TERRAIN.grass && isProtected(x, y)) { skipped++; continue; }
            setTerrainAt(x, y, ch);
          }
        }
        draw();
        skipped > 0 ? setStatus("protected base zones must stay grass", true) : updateStatus();
      }

      function resizeMap(nextSize) {
        if (activeView !== "edit") return;
        const size = Math.max(MIN_SIZE, Math.min(MAX_SIZE, nextSize));
        const oldSize = map.terrain.length;
        const rows = [];
        for (let y = 0; y < size; y++) {
          let row = "";
          for (let x = 0; x < size; x++) row += x < oldSize && y < oldSize ? terrainAt(x, y) : TERRAIN.grass;
          rows.push(row);
        }
        map.terrain = rows;
        atlasData = null;
        atlasHoverTile = null;
        map.sites.forEach(function (site) {
          const r = siteRadius(site);
          site.x = Math.max(r, Math.min(size - r - 1, site.x));
          site.y = Math.max(r, Math.min(size - r - 1, site.y));
        });
        map.sites.forEach(clearProtectedArea);
        refresh();
      }

      async function loadDefault() {
        try {
          currentBuiltInFile = "default-handcrafted.json";
          renderBuiltInMapSelect();
          await loadMapUrl(DEFAULT_MAP_URL, "Default");
        } catch (err) {
          map = fallbackMap();
          selectedSiteId = map.sites[0].id;
          selectedLayoutId = map.layouts[0].id;
          atlasData = null;
          atlasHoverTile = null;
          refresh();
          setStatus("default fetch failed: " + err.message, true);
        }
      }

      function payload() {
        return {
          version: MAP_SCHEMA_VERSION,
          name: map.name || "handcrafted-map",
          description: map.description || "",
          _design: map._design || "",
          terrain: map.terrain,
          sites: map.sites.map(cloneSite),
          layouts: map.layouts.map(cloneLayout),
        };
      }

      function saveMap() {
        const errors = validationErrors();
        if (errors.length) { setStatus(errors[0], true); return; }
        const out = payload();
        const blob = new Blob([JSON.stringify(out, null, 2) + "\n"], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = (out.name || "map") + ".json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(link.href);
      }

      async function saveMapAs() {
        const errors = validationErrors();
        if (errors.length) { setStatus(errors[0], true); return; }
        const suggested = map.name || "handcrafted-map";
        const raw = window.prompt("Save map as (lowercase letters, digits, hyphens):", suggested);
        if (raw === null) return;
        const name = raw.trim().toLowerCase().replace(/[^a-z0-9-]/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "");
        if (!name) { setStatus("invalid name", true); return; }
        const out = payload();
        out.name = name;
        try {
          setStatus("saving...");
          const resp = await fetch("/maps/save", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: name, payload: out }),
          });
          if (!resp.ok) { setStatus("save failed: " + await resp.text(), true); return; }
          map.name = name;
          refresh();
          setStatus("saved as " + name + ".json");
        } catch (err) {
          setStatus("save error: " + err.message, true);
        }
      }

      document.getElementById("tools").addEventListener("click", function (event) {
        const button = event.target.closest("[data-tool]");
        if (!button) return;
        selectedTool = button.dataset.tool;
        syncToolButtons();
      });
      document.getElementById("modes").addEventListener("click", function (event) {
        const button = event.target.closest("[data-mode]");
        if (!button) return;
        selectedMode = button.dataset.mode;
        syncModeButtons();
      });
      document.getElementById("view-tabs").addEventListener("click", function (event) {
        const button = event.target.closest("[data-view]");
        if (!button) return;
        activeView = button.dataset.view;
        pointerDown = false;
        syncViewTabs();
        if (activeView === "atlas" && !atlasData) loadAtlasDiagnostics();
        else draw();
      });
      canvas.addEventListener("pointerdown", function (event) {
        const tile = canvasTile(event);
        if (!tile) return;
        if (activeView === "atlas") {
          atlasHoverTile = tile;
          updateAtlasReadout();
          return;
        }
        pointerDown = true;
        dragStartTile = tile;
        dragPreviewTile = tile;
        canvas.setPointerCapture(event.pointerId);
        if (selectedTool === "base" || selectedMode === "paint") applyTool(tile); else draw();
      });
      canvas.addEventListener("pointermove", function (event) {
        if (activeView === "atlas") {
          atlasHoverTile = canvasTile(event);
          updateAtlasReadout();
          return;
        }
        if (!pointerDown || selectedTool === "base") return;
        const tile = canvasTile(event);
        if (!tile) return;
        dragPreviewTile = tile;
        selectedMode === "paint" ? applyTool(tile) : draw();
      });
      canvas.addEventListener("pointerup", function () {
        if (selectedMode === "box" && selectedTool !== "base") applyBox(dragStartTile, dragPreviewTile);
        pointerDown = false;
        dragStartTile = null;
        dragPreviewTile = null;
      });
      canvas.addEventListener("pointercancel", function () {
        pointerDown = false;
        dragStartTile = null;
        dragPreviewTile = null;
        draw();
      });
      document.getElementById("load-file").addEventListener("click", function () { fileInput.click(); });
      fileInput.addEventListener("change", async function () {
        const file = fileInput.files && fileInput.files[0];
        if (!file) return;
        try {
          map = normalizeMap(JSON.parse(await file.text()));
          selectedSiteId = map.sites[0].id;
          selectedLayoutId = map.layouts[0].id;
          atlasData = null;
          atlasHoverTile = null;
          map.sites.forEach(clearProtectedArea);
          refresh();
        } catch (err) {
          setStatus(err.message, true);
        } finally {
          fileInput.value = "";
        }
      });
      builtInMapSelect.addEventListener("change", function (event) { loadBuiltInMap(event.target.value); });
      atlasMovementEl.addEventListener("change", function () { draw(); });
      Object.values(atlasLayerInputs).forEach(function (input) {
        input.addEventListener("change", function () { draw(); });
      });
      atlasPanelEl.addEventListener("pointerover", function (event) {
        const helpTarget = event.target.closest("[data-atlas-help]");
        if (!helpTarget || !atlasPanelEl.contains(helpTarget)) return;
        atlasHelpKey = helpTarget.dataset.atlasHelp || "";
        updateAtlasReadout();
      });
      atlasPanelEl.addEventListener("pointerout", function (event) {
        const helpTarget = event.target.closest("[data-atlas-help]");
        if (!helpTarget || !atlasPanelEl.contains(helpTarget)) return;
        if (event.relatedTarget && helpTarget.contains(event.relatedTarget)) return;
        atlasHelpKey = "";
        updateAtlasReadout();
      });
      atlasPanelEl.addEventListener("focusin", function (event) {
        const helpTarget = event.target.closest("[data-atlas-help]");
        if (!helpTarget || !atlasPanelEl.contains(helpTarget)) return;
        atlasHelpKey = helpTarget.dataset.atlasHelp || "";
        updateAtlasReadout();
      });
      atlasPanelEl.addEventListener("focusout", function () {
        atlasHelpKey = "";
        updateAtlasReadout();
      });
      document.getElementById("save-file").addEventListener("click", saveMap);
      document.getElementById("save-as-file").addEventListener("click", saveMapAs);
      document.getElementById("reset-map").addEventListener("click", loadDefault);
      document.getElementById("resize-map").addEventListener("click", function () { resizeMap(Number(sizeInput.value)); });

      syncToolButtons();
      syncModeButtons();
      renderBuiltInMapSelect();
      loadMapCatalog();
      loadDefault();
    </script>
  </body>
</html>
