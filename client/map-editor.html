<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bewegungskrieg Map Editor</title>
    <style>
      :root {
        --bg: #151713;
        --panel: #242820;
        --panel-2: #303629;
        --edge: #5d6651;
        --text: #e7dfc5;
        --muted: #b0aa91;
        --faint: #77715f;
        --accent: #c7d07a;
        --bad: #c86155;
        --grass: #59633f;
        --rock: #6a6659;
        --water: #2f5560;
        --grid: rgba(0, 0, 0, 0.26);
        --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 14px;
      }

      body {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        overflow: hidden;
      }

      aside {
        height: 100vh;
        overflow: auto;
        border-right: 1px solid var(--edge);
        background: var(--panel);
        padding: 18px;
      }

      main {
        min-width: 0;
        height: 100vh;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        color: var(--accent);
        font-size: 22px;
        line-height: 1.1;
      }

      h2 {
        margin-top: 22px;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      button,
      input[type="number"] {
        font: inherit;
      }

      button {
        min-height: 34px;
        border: 1px solid var(--edge);
        border-radius: 3px;
        background: var(--panel-2);
        color: var(--text);
        cursor: pointer;
      }

      button:hover {
        border-color: var(--accent);
      }

      button.active {
        border-color: var(--accent);
        box-shadow: inset 0 0 0 1px rgba(199, 208, 122, 0.38);
      }

      input[type="number"] {
        width: 72px;
        height: 34px;
        border: 1px solid var(--edge);
        border-radius: 3px;
        background: #171a14;
        color: var(--text);
        padding: 0 8px;
      }

      .actions,
      .size-row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .actions button {
        padding: 0 11px;
      }

      .tool-grid {
        display: grid;
        gap: 8px;
      }

      .mode-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .tool {
        display: grid;
        grid-template-columns: 22px 1fr;
        gap: 9px;
        align-items: center;
        padding: 7px 8px;
        text-align: left;
      }

      .swatch {
        width: 20px;
        height: 20px;
        border: 1px solid rgba(255, 255, 255, 0.25);
      }

      .swatch.grass {
        background: var(--grass);
      }

      .swatch.rock {
        background: var(--rock);
      }

      .swatch.water {
        background: var(--water);
      }

      .swatch.base {
        background:
          linear-gradient(45deg, transparent 42%, var(--accent) 42% 58%, transparent 58%),
          linear-gradient(-45deg, transparent 42%, var(--accent) 42% 58%, transparent 58%),
          #191b14;
      }

      .base-list {
        display: grid;
        gap: 6px;
      }

      .base-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        padding: 7px 8px;
        border: 1px solid var(--edge);
        border-radius: 3px;
        background: #1c2019;
      }

      .base-row.active {
        border-color: var(--accent);
      }

      .base-name {
        font-weight: 700;
      }

      .base-kind {
        display: block;
        color: var(--faint);
        font-family: var(--mono);
        font-size: 11px;
        margin-top: 2px;
      }

      .base-coord {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
      }

      .topbar {
        display: flex;
        gap: 14px;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--edge);
        background: #1b1e18;
        padding: 10px 14px;
      }

      #status {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
        min-width: 220px;
        text-align: right;
      }

      #status.bad {
        color: var(--bad);
      }

      .canvas-wrap {
        min-width: 0;
        min-height: 0;
        overflow: auto;
        padding: 16px;
        background:
          linear-gradient(45deg, rgba(255, 255, 255, 0.035) 25%, transparent 25% 75%, rgba(0, 0, 0, 0.08) 75%),
          linear-gradient(45deg, rgba(0, 0, 0, 0.08) 25%, transparent 25% 75%, rgba(255, 255, 255, 0.035) 75%),
          #10120f;
        background-position: 0 0, 8px 8px;
        background-size: 16px 16px;
      }

      canvas {
        display: block;
        border: 1px solid var(--edge);
        background: var(--grass);
        image-rendering: pixelated;
        cursor: crosshair;
      }

      .file-input {
        display: none;
      }

      @media (max-width: 820px) {
        body {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr);
        }

        aside {
          height: auto;
          max-height: 45vh;
          border-right: 0;
          border-bottom: 1px solid var(--edge);
        }

        main {
          height: 55vh;
        }
      }
    </style>
  </head>
  <body>
    <aside>
      <h1>Map Editor</h1>

      <h2>File</h2>
      <div class="actions">
        <button id="load-file" type="button">Load</button>
        <button id="save-file" type="button">Save JSON</button>
        <button id="reset-map" type="button">Reload Default</button>
        <input id="file-input" class="file-input" type="file" accept="application/json,.json" />
      </div>

      <h2>Map</h2>
      <div class="size-row">
        <label>
          Size
          <input id="map-size" type="number" min="24" max="160" step="1" value="96" />
        </label>
        <button id="resize-map" type="button">Resize</button>
      </div>

      <h2>Palette</h2>
      <div class="tool-grid" id="tools">
        <button class="tool active" type="button" data-tool="grass">
          <span class="swatch grass"></span>
          <span>Grass</span>
        </button>
        <button class="tool" type="button" data-tool="rock">
          <span class="swatch rock"></span>
          <span>Stone</span>
        </button>
        <button class="tool" type="button" data-tool="water">
          <span class="swatch water"></span>
          <span>Water</span>
        </button>
        <button class="tool" type="button" data-tool="base">
          <span class="swatch base"></span>
          <span>Base Site</span>
        </button>
      </div>

      <h2>Drag</h2>
      <div class="mode-grid" id="modes">
        <button class="active" type="button" data-mode="paint">Paint</button>
        <button type="button" data-mode="box">Box</button>
      </div>

      <h2>Base Sites</h2>
      <div id="base-list" class="base-list"></div>
    </aside>

    <main>
      <div class="topbar">
        <div id="map-name">default-handcrafted</div>
        <div id="status">Ready</div>
      </div>
      <div class="canvas-wrap">
        <canvas id="map-canvas" width="960" height="960"></canvas>
      </div>
    </main>

    <script>
      const TERRAIN = Object.freeze({
        grass: ".",
        rock: "#",
        water: "~",
      });
      const COLORS = Object.freeze({
        ".": "#59633f",
        "#": "#6a6659",
        "~": "#2f5560",
        grid: "rgba(0,0,0,0.22)",
        protect: "rgba(199,208,122,0.10)",
        protectEdge: "rgba(199,208,122,0.45)",
        base: "#c7d07a",
        baseText: "#151713",
        start: "#d9e18b",
        expansion: "#b7c5d9",
      });
      const PROTECTION_RADIUS = 7;
      const EXPANSION_PROTECTION_RADIUS = 4;

      function siteRadius(i) {
        return i % 2 === 1 ? EXPANSION_PROTECTION_RADIUS : PROTECTION_RADIUS;
      }
      const MIN_SIZE = 24;
      const MAX_SIZE = 160;
      const DEFAULT_MAP_URL = "/maps/default-handcrafted.json";

      const fallbackMap = () => ({
        name: "blank-handcrafted",
        terrain: Array.from({ length: 96 }, () => ".".repeat(96)),
        baseSites: [
          { x: 10, y: 10 },
          { x: 85, y: 85 },
          { x: 85, y: 10 },
          { x: 10, y: 85 },
          { x: 48, y: 12 },
          { x: 85, y: 48 },
          { x: 48, y: 85 },
          { x: 12, y: 48 },
        ],
      });

      const canvas = document.getElementById("map-canvas");
      const ctx = canvas.getContext("2d");
      const statusEl = document.getElementById("status");
      const mapNameEl = document.getElementById("map-name");
      const sizeInput = document.getElementById("map-size");
      const fileInput = document.getElementById("file-input");
      const baseListEl = document.getElementById("base-list");

      let map = fallbackMap();
      let selectedTool = "grass";
      let selectedMode = "paint";
      let selectedBase = 0;
      let pointerDown = false;
      let dragStartTile = null;
      let dragPreviewTile = null;
      let cellSize = 10;

      function normalizeMap(raw) {
        const name = String(raw.name || "handcrafted-map");
        const rows = Array.isArray(raw.terrain) ? raw.terrain.map(String) : [];
        if (!rows.length) throw new Error("terrain must contain rows");
        const size = rows[0].length;
        if (size < MIN_SIZE || size > MAX_SIZE) {
          throw new Error(`size must be between ${MIN_SIZE} and ${MAX_SIZE}`);
        }
        if (rows.length !== size) throw new Error("terrain must be square");
        for (const [y, row] of rows.entries()) {
          if (row.length !== size) throw new Error(`row ${y} has the wrong width`);
          for (const ch of row) {
            if (ch !== "." && ch !== "#" && ch !== "~") {
              throw new Error(`unknown terrain character "${ch}"`);
            }
          }
        }
        const baseSites = Array.isArray(raw.baseSites) ? raw.baseSites : [];
        if (!baseSites.length) throw new Error("baseSites must not be empty");
        const sites = baseSites.map((site, i) => {
          const x = Number(site.x);
          const y = Number(site.y);
          if (!Number.isInteger(x) || !Number.isInteger(y)) {
            throw new Error(`baseSites[${i}] must use integer coordinates`);
          }
          if (x < 0 || y < 0 || x >= size || y >= size) {
            throw new Error(`baseSites[${i}] is outside the map`);
          }
          return { x, y };
        });
        return { name, terrain: rows, baseSites: sites };
      }

      function setStatus(text, bad = false) {
        statusEl.textContent = text;
        statusEl.classList.toggle("bad", bad);
      }

      function terrainAt(x, y) {
        return map.terrain[y][x];
      }

      function setTerrainAt(x, y, ch) {
        const row = map.terrain[y];
        map.terrain[y] = row.slice(0, x) + ch + row.slice(x + 1);
      }

      function isProtected(x, y) {
        return map.baseSites.some((site, i) => {
          const r = siteRadius(i);
          return Math.abs(site.x - x) <= r && Math.abs(site.y - y) <= r;
        });
      }

      function clearProtectedArea(site, i) {
        const r = siteRadius(i);
        for (let y = site.y - r; y <= site.y + r; y++) {
          for (let x = site.x - r; x <= site.x + r; x++) {
            if (x >= 0 && y >= 0 && x < map.terrain.length && y < map.terrain.length) {
              setTerrainAt(x, y, TERRAIN.grass);
            }
          }
        }
      }

      function validationErrors() {
        const errors = [];
        const size = map.terrain.length;
        const seen = new Set();
        map.baseSites.forEach((site, i) => {
          const key = `${site.x},${site.y}`;
          if (seen.has(key)) errors.push(`duplicate base site ${i + 1}`);
          seen.add(key);
          const r = siteRadius(i);
          if (
            site.x < r ||
            site.y < r ||
            site.x >= size - r ||
            site.y >= size - r
          ) {
            errors.push(`base ${i + 1} too close to edge`);
          }
          for (let y = site.y - r; y <= site.y + r; y++) {
            for (let x = site.x - r; x <= site.x + r; x++) {
              if (x < 0 || y < 0 || x >= size || y >= size) continue;
              if (terrainAt(x, y) !== TERRAIN.grass) {
                errors.push(`base ${i + 1} protected zone blocked`);
                return;
              }
            }
          }
        });
        return errors;
      }

      function updateStatus() {
        const errors = validationErrors();
        if (errors.length) {
          setStatus(errors[0], true);
        } else {
          setStatus(`${map.terrain.length}x${map.terrain.length} valid`);
        }
      }

      function draw() {
        const size = map.terrain.length;
        cellSize = Math.max(6, Math.min(12, Math.floor(920 / size)));
        canvas.width = size * cellSize;
        canvas.height = size * cellSize;

        for (let y = 0; y < size; y++) {
          for (let x = 0; x < size; x++) {
            ctx.fillStyle = COLORS[terrainAt(x, y)];
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
          }
        }

        ctx.strokeStyle = COLORS.grid;
        ctx.lineWidth = 1;
        for (let i = 0; i <= size; i++) {
          const p = i * cellSize + 0.5;
          ctx.beginPath();
          ctx.moveTo(p, 0);
          ctx.lineTo(p, canvas.height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, p);
          ctx.lineTo(canvas.width, p);
          ctx.stroke();
        }

        map.baseSites.forEach((site, i) => {
          const r = siteRadius(i);
          const x = (site.x - r) * cellSize;
          const y = (site.y - r) * cellSize;
          const w = (r * 2 + 1) * cellSize;
          ctx.fillStyle = COLORS.protect;
          ctx.fillRect(x, y, w, w);
          ctx.strokeStyle = COLORS.protectEdge;
          ctx.strokeRect(x + 0.5, y + 0.5, w - 1, w - 1);
        });

        map.baseSites.forEach((site, i) => {
          const cx = site.x * cellSize + cellSize / 2;
          const cy = site.y * cellSize + cellSize / 2;
          const radius = Math.max(5, cellSize * 0.58);
          ctx.fillStyle = i < 4 ? COLORS.start : COLORS.expansion;
          ctx.strokeStyle = i === selectedBase ? "#ffffff" : "#11110f";
          ctx.lineWidth = i === selectedBase ? 3 : 2;
          ctx.beginPath();
          ctx.arc(cx, cy, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = COLORS.baseText;
          ctx.font = `700 ${Math.max(10, Math.floor(cellSize * 0.95))}px ${getComputedStyle(document.body).fontFamily}`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(String(i + 1), cx, cy + 0.5);
        });

        if (pointerDown && selectedMode === "box" && selectedTool !== "base" && dragStartTile && dragPreviewTile) {
          const rect = tileRect(dragStartTile, dragPreviewTile);
          ctx.fillStyle = "rgba(199,208,122,0.12)";
          ctx.fillRect(rect.x0 * cellSize, rect.y0 * cellSize, rect.w * cellSize, rect.h * cellSize);
          ctx.strokeStyle = "#e7dfc5";
          ctx.lineWidth = 2;
          ctx.strokeRect(
            rect.x0 * cellSize + 1,
            rect.y0 * cellSize + 1,
            rect.w * cellSize - 2,
            rect.h * cellSize - 2,
          );
        }
      }

      function renderBaseList() {
        baseListEl.replaceChildren();
        map.baseSites.forEach((site, i) => {
          const row = document.createElement("button");
          row.type = "button";
          row.className = `base-row${i === selectedBase ? " active" : ""}`;
          row.innerHTML = `
            <span>
              <span class="base-name">Base ${i + 1}</span>
              <span class="base-kind">${i < 4 ? "player start candidate" : "neutral expansion"}</span>
            </span>
            <span class="base-coord">${site.x},${site.y}</span>
          `;
          row.addEventListener("click", () => {
            selectedBase = i;
            selectedTool = "base";
            syncToolButtons();
            refresh();
          });
          baseListEl.appendChild(row);
        });
      }

      function refresh() {
        mapNameEl.textContent = map.name;
        sizeInput.value = String(map.terrain.length);
        renderBaseList();
        draw();
        updateStatus();
      }

      function syncToolButtons() {
        document.querySelectorAll("[data-tool]").forEach((button) => {
          button.classList.toggle("active", button.dataset.tool === selectedTool);
        });
      }

      function syncModeButtons() {
        document.querySelectorAll("[data-mode]").forEach((button) => {
          button.classList.toggle("active", button.dataset.mode === selectedMode);
        });
      }

      function canvasTile(event) {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((event.clientX - rect.left) / cellSize);
        const y = Math.floor((event.clientY - rect.top) / cellSize);
        const size = map.terrain.length;
        if (x < 0 || y < 0 || x >= size || y >= size) return null;
        return { x, y };
      }

      function tileRect(a, b) {
        const x0 = Math.min(a.x, b.x);
        const y0 = Math.min(a.y, b.y);
        const x1 = Math.max(a.x, b.x);
        const y1 = Math.max(a.y, b.y);
        return { x0, y0, x1, y1, w: x1 - x0 + 1, h: y1 - y0 + 1 };
      }

      function applyTool(tile) {
        if (!tile) return;
        if (selectedTool === "base") {
          map.baseSites[selectedBase] = { x: tile.x, y: tile.y };
          clearProtectedArea(map.baseSites[selectedBase], selectedBase);
          refresh();
          return;
        }

        const ch = TERRAIN[selectedTool];
        if (!ch) return;
        if (ch !== TERRAIN.grass && isProtected(tile.x, tile.y)) {
          setStatus("protected base zones must stay grass", true);
          return;
        }
        setTerrainAt(tile.x, tile.y, ch);
        draw();
        updateStatus();
      }

      function applyBox(a, b) {
        if (!a || !b || selectedTool === "base") return;
        const ch = TERRAIN[selectedTool];
        if (!ch) return;
        const rect = tileRect(a, b);
        let skipped = 0;
        for (let y = rect.y0; y <= rect.y1; y++) {
          for (let x = rect.x0; x <= rect.x1; x++) {
            if (ch !== TERRAIN.grass && isProtected(x, y)) {
              skipped++;
              continue;
            }
            setTerrainAt(x, y, ch);
          }
        }
        draw();
        if (skipped > 0) {
          setStatus("protected base zones must stay grass", true);
        } else {
          updateStatus();
        }
      }

      function resizeMap(nextSize) {
        const size = Math.max(MIN_SIZE, Math.min(MAX_SIZE, nextSize));
        const oldSize = map.terrain.length;
        const rows = [];
        for (let y = 0; y < size; y++) {
          let row = "";
          for (let x = 0; x < size; x++) {
            row += x < oldSize && y < oldSize ? terrainAt(x, y) : TERRAIN.grass;
          }
          rows.push(row);
        }
        map.terrain = rows;
        map.baseSites = map.baseSites.map((site, i) => {
          const r = siteRadius(i);
          return {
            x: Math.max(r, Math.min(size - r - 1, site.x)),
            y: Math.max(r, Math.min(size - r - 1, site.y)),
          };
        });
        map.baseSites.forEach(clearProtectedArea);
        refresh();
      }

      async function loadDefault() {
        try {
          const response = await fetch(DEFAULT_MAP_URL, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          map = normalizeMap(await response.json());
          selectedBase = Math.min(selectedBase, map.baseSites.length - 1);
          map.baseSites.forEach(clearProtectedArea);
          refresh();
        } catch (err) {
          map = fallbackMap();
          refresh();
          setStatus(`default fetch failed: ${err.message}`, true);
        }
      }

      function saveMap() {
        const errors = validationErrors();
        if (errors.length) {
          setStatus(errors[0], true);
          return;
        }
        const payload = {
          name: map.name || "handcrafted-map",
          terrain: map.terrain,
          baseSites: map.baseSites,
        };
        const blob = new Blob([JSON.stringify(payload, null, 2) + "\n"], {
          type: "application/json",
        });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${payload.name || "map"}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(link.href);
      }

      document.getElementById("tools").addEventListener("click", (event) => {
        const button = event.target.closest("[data-tool]");
        if (!button) return;
        selectedTool = button.dataset.tool;
        syncToolButtons();
      });

      document.getElementById("modes").addEventListener("click", (event) => {
        const button = event.target.closest("[data-mode]");
        if (!button) return;
        selectedMode = button.dataset.mode;
        syncModeButtons();
      });

      canvas.addEventListener("pointerdown", (event) => {
        const tile = canvasTile(event);
        if (!tile) return;
        pointerDown = true;
        dragStartTile = tile;
        dragPreviewTile = tile;
        canvas.setPointerCapture(event.pointerId);
        if (selectedTool === "base" || selectedMode === "paint") {
          applyTool(tile);
        } else {
          draw();
        }
      });
      canvas.addEventListener("pointermove", (event) => {
        if (!pointerDown || selectedTool === "base") return;
        const tile = canvasTile(event);
        if (!tile) return;
        dragPreviewTile = tile;
        if (selectedMode === "paint") {
          applyTool(tile);
        } else {
          draw();
        }
      });
      canvas.addEventListener("pointerup", () => {
        if (selectedMode === "box" && selectedTool !== "base") {
          applyBox(dragStartTile, dragPreviewTile);
        }
        pointerDown = false;
        dragStartTile = null;
        dragPreviewTile = null;
      });
      canvas.addEventListener("pointercancel", () => {
        pointerDown = false;
        dragStartTile = null;
        dragPreviewTile = null;
        draw();
      });

      document.getElementById("load-file").addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", async () => {
        const file = fileInput.files && fileInput.files[0];
        if (!file) return;
        try {
          map = normalizeMap(JSON.parse(await file.text()));
          selectedBase = Math.min(selectedBase, map.baseSites.length - 1);
          map.baseSites.forEach(clearProtectedArea);
          refresh();
        } catch (err) {
          setStatus(err.message, true);
        } finally {
          fileInput.value = "";
        }
      });
      document.getElementById("save-file").addEventListener("click", saveMap);
      document.getElementById("reset-map").addEventListener("click", loadDefault);
      document.getElementById("resize-map").addEventListener("click", () => {
        resizeMap(Number(sizeInput.value));
      });

      syncToolButtons();
      syncModeButtons();
      loadDefault();
    </script>
  </body>
</html>
