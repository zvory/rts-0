<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bewegungskrieg Map Editor</title>
    <style>
      :root {
        --bg: #151713;
        --panel: #242820;
        --panel-2: #303629;
        --edge: #5d6651;
        --text: #e7dfc5;
        --muted: #b0aa91;
        --faint: #77715f;
        --accent: #c7d07a;
        --bad: #c86155;
        --grass: #59633f;
        --rock: #6a6659;
        --water: #2f5560;
        --grid: rgba(0, 0, 0, 0.26);
        --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 14px;
      }

      body {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        overflow: hidden;
      }

      aside {
        height: 100vh;
        overflow: auto;
        border-right: 1px solid var(--edge);
        background: var(--panel);
        padding: 18px;
      }

      main {
        min-width: 0;
        height: 100vh;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        color: var(--accent);
        font-size: 22px;
        line-height: 1.1;
      }

      h2 {
        margin-top: 22px;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      button,
      input[type="number"],
      input[type="text"],
      select {
        font: inherit;
      }

      button {
        min-height: 34px;
        border: 1px solid var(--edge);
        border-radius: 3px;
        background: var(--panel-2);
        color: var(--text);
        cursor: pointer;
      }

      button:hover {
        border-color: var(--accent);
      }

      button.active {
        border-color: var(--accent);
        box-shadow: inset 0 0 0 1px rgba(199, 208, 122, 0.38);
      }

      input[type="number"],
      input[type="text"] {
        width: 72px;
        height: 34px;
        border: 1px solid var(--edge);
        border-radius: 3px;
        background: #171a14;
        color: var(--text);
        padding: 0 8px;
      }

      select {
        height: 30px;
        border: 1px solid var(--edge);
        border-radius: 3px;
        background: #171a14;
        color: var(--text);
        padding: 0 8px;
      }

      .actions,
      .size-row,
      .map-select-row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .actions button {
        padding: 0 11px;
      }

      .map-select-row {
        margin-top: 8px;
      }

      .map-select-row label {
        display: grid;
        gap: 4px;
        width: 100%;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .map-select-row select {
        width: 100%;
      }

      .tool-grid {
        display: grid;
        gap: 8px;
      }

      .mode-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .tool {
        display: grid;
        grid-template-columns: 22px 1fr;
        gap: 9px;
        align-items: center;
        padding: 7px 8px;
        text-align: left;
      }

      .swatch {
        width: 20px;
        height: 20px;
        border: 1px solid rgba(255, 255, 255, 0.25);
      }

      .swatch.grass {
        background: var(--grass);
      }

      .swatch.rock {
        background: var(--rock);
      }

      .swatch.water {
        background: var(--water);
      }

      .swatch.base {
        background:
          linear-gradient(45deg, transparent 42%, var(--accent) 42% 58%, transparent 58%),
          linear-gradient(-45deg, transparent 42%, var(--accent) 42% 58%, transparent 58%),
          #191b14;
      }

      .base-list {
        display: grid;
        gap: 6px;
      }

      .base-section {
        display: grid;
        gap: 8px;
      }

      .base-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        padding: 7px 8px;
        border: 1px solid var(--edge);
        border-radius: 3px;
        background: #1c2019;
        color: var(--text);
        cursor: pointer;
      }

      .base-row.active {
        border-color: var(--accent);
      }

      .base-row:hover {
        border-color: var(--accent);
      }

      .pair-row {
        grid-template-columns: 1fr auto;
      }

      .base-name {
        font-weight: 700;
      }

      .base-kind {
        display: block;
        color: var(--faint);
        font-family: var(--mono);
        font-size: 11px;
        margin-top: 2px;
      }

      .base-coord {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
      }

      .topbar {
        display: flex;
        gap: 14px;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--edge);
        background: #1b1e18;
        padding: 10px 14px;
      }

      #status {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
        min-width: 220px;
        text-align: right;
      }

      #status.bad {
        color: var(--bad);
      }

      .canvas-wrap {
        min-width: 0;
        min-height: 0;
        overflow: auto;
        padding: 16px;
        background:
          linear-gradient(45deg, rgba(255, 255, 255, 0.035) 25%, transparent 25% 75%, rgba(0, 0, 0, 0.08) 75%),
          linear-gradient(45deg, rgba(0, 0, 0, 0.08) 25%, transparent 25% 75%, rgba(255, 255, 255, 0.035) 75%),
          #10120f;
        background-position: 0 0, 8px 8px;
        background-size: 16px 16px;
      }

      canvas {
        display: block;
        border: 1px solid var(--edge);
        background: var(--grass);
        image-rendering: pixelated;
        cursor: crosshair;
      }

      .file-input {
        display: none;
      }

      @media (max-width: 820px) {
        body {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr);
        }

        aside {
          height: auto;
          max-height: 45vh;
          border-right: 0;
          border-bottom: 1px solid var(--edge);
        }

        main {
          height: 55vh;
        }
      }
    </style>
  </head>
  <body>
    <aside>
      <h1>Map Editor</h1>

      <h2>File</h2>
      <div class="actions">
        <button id="load-file" type="button">Load</button>
        <button id="save-file" type="button">Save JSON</button>
        <button id="save-as-file" type="button">Save As</button>
        <button id="reset-map" type="button">Reload Default</button>
        <input id="file-input" class="file-input" type="file" accept="application/json,.json" />
      </div>
      <div class="map-select-row">
        <label>
          Built-In Map
          <select id="built-in-map"></select>
        </label>
      </div>

      <h2>Map</h2>
      <div class="size-row">
        <label>
          Size
          <input id="map-size" type="number" min="24" max="160" step="1" value="126" />
        </label>
        <button id="resize-map" type="button">Resize</button>
      </div>

      <h2>Palette</h2>
      <div class="tool-grid" id="tools">
        <button class="tool active" type="button" data-tool="grass">
          <span class="swatch grass"></span>
          <span>Grass</span>
        </button>
        <button class="tool" type="button" data-tool="rock">
          <span class="swatch rock"></span>
          <span>Stone</span>
        </button>
        <button class="tool" type="button" data-tool="water">
          <span class="swatch water"></span>
          <span>Water</span>
        </button>
        <button class="tool" type="button" data-tool="base">
          <span class="swatch base"></span>
          <span>Base Site</span>
        </button>
      </div>

      <h2>Drag</h2>
      <div class="mode-grid" id="modes">
        <button class="active" type="button" data-mode="paint">Paint</button>
        <button type="button" data-mode="box">Box</button>
      </div>

      <h2>Symmetry</h2>
      <div class="mode-grid" id="symmetry-modes">
        <button class="active" type="button" data-symmetry="none">Off</button>
        <button type="button" data-symmetry="left-right" title="Reflect across the vertical center line">Left ↔ Right</button>
        <button type="button" data-symmetry="top-bottom" title="Reflect across the horizontal center line">Top ↔ Bottom</button>
        <button type="button" data-symmetry="radial" title="Rotate edits 180 degrees around the map center">Rotate 180°</button>
      </div>

      <h2>Spawn Layout</h2>
      <div class="base-section">
        <div id="pair-list" class="base-list"></div>
      </div>

      <h2>Sites</h2>
      <div class="base-section">
        <div id="natural-list" class="base-list"></div>
      </div>
    </aside>

    <main>
      <div class="topbar">
        <div id="map-name">default-handcrafted</div>
        <div id="status">Ready</div>
      </div>
      <div class="canvas-wrap">
        <canvas id="map-canvas" width="960" height="960"></canvas>
      </div>
    </main>

    <script>
      const TERRAIN = Object.freeze({
        grass: ".",
        rock: "#",
        water: "~",
      });
      const COLORS = Object.freeze({
        ".": "#59633f",
        "#": "#6a6659",
        "~": "#2f5560",
        grid: "rgba(0,0,0,0.22)",
        protect: "rgba(199,208,122,0.10)",
        protectEdge: "rgba(199,208,122,0.45)",
        base: "#c7d07a",
        baseText: "#151713",
        start: "#d9e18b",
        expansion: "#b7c5d9",
        pairLine: "rgba(231,223,197,0.62)",
        symmetry: "rgba(231,223,197,0.62)",
      });
      const PROTECTION_RADIUS = 7;
      const EXPANSION_PROTECTION_RADIUS = 4;
      const NATURALS_PER_SLOT = 3;
      const MIN_SIZE = 24;
      const MAX_SIZE = 160;
      const DEFAULT_MAP_URL = "/maps/default-handcrafted.json";
      const MAP_CATALOG_URL = "/maps/catalog";
      const FALLBACK_BUILT_IN_MAPS = Object.freeze([
        { file: "default-handcrafted.json", name: "Default", description: "4-player three-base map with safer in-base naturals plus a standardized contested natural for each spawn." },
        { file: "low-econ.json", name: "Low Econ", description: "Original lower-economy 4-player map with one natural expansion per spawn." },
        { file: "no-terrain.json", name: "No Terrain", description: "All grass map." },
      ]);
      const MAP_SCHEMA_VERSION = 2;

      const canvas = document.getElementById("map-canvas");
      const ctx = canvas.getContext("2d");
      const statusEl = document.getElementById("status");
      const mapNameEl = document.getElementById("map-name");
      const sizeInput = document.getElementById("map-size");
      const fileInput = document.getElementById("file-input");
      const builtInMapSelect = document.getElementById("built-in-map");
      const pairListEl = document.getElementById("pair-list");
      const naturalListEl = document.getElementById("natural-list");

      let map = fallbackMap();
      let selectedTool = "grass";
      let selectedMode = "paint";
      let selectedSymmetry = "none";
      let selectedSiteId = map.sites[0].id;
      let selectedLayoutId = map.layouts[0].id;
      let pointerDown = false;
      let dragStartTile = null;
      let dragPreviewTile = null;
      let cellSize = 10;
      let builtInMaps = FALLBACK_BUILT_IN_MAPS.slice();
      let currentBuiltInFile = "default-handcrafted.json";

      function cloneSite(site) {
        return { id: site.id, kind: site.kind, x: site.x, y: site.y };
      }

      function cloneLayout(layout) {
        return {
          id: layout.id,
          playerCount: layout.playerCount,
          slots: layout.slots.map(function (slot) {
            return { main: slot.main, naturals: slot.naturals.slice() };
          }),
        };
      }

      function cloneMapState() {
        return {
          version: map.version,
          name: map.name,
          description: map.description,
          _design: map._design,
          terrain: map.terrain.slice(),
          sites: map.sites.map(cloneSite),
          layouts: map.layouts.map(cloneLayout),
        };
      }

      function fallbackMap() {
        return normalizeMap({
          version: MAP_SCHEMA_VERSION,
          name: "blank-handcrafted",
          description: "",
          _design: "",
          terrain: Array.from({ length: 126 }, function () { return ".".repeat(126); }),
          sites: [
            { id: "main_nw", kind: "main", x: 25, y: 25 },
            { id: "main_se", kind: "main", x: 100, y: 100 },
            { id: "main_ne", kind: "main", x: 100, y: 25 },
            { id: "main_sw", kind: "main", x: 25, y: 100 },
            { id: "nat_top", kind: "natural", x: 63, y: 38 },
            { id: "nat_bottom", kind: "natural", x: 63, y: 88 },
            { id: "nat_right", kind: "natural", x: 88, y: 62 },
            { id: "nat_left", kind: "natural", x: 38, y: 62 },
          ],
          layouts: [
            {
              id: "4p_all",
              playerCount: 4,
              slots: [
                { main: "main_nw", naturals: ["nat_top"] },
                { main: "main_se", naturals: ["nat_bottom"] },
                { main: "main_ne", naturals: ["nat_right"] },
                { main: "main_sw", naturals: ["nat_left"] },
              ],
            },
          ],
        });
      }

      function mains() {
        return map.sites.filter(function (site) { return site.kind === "main"; });
      }

      function naturals() {
        return map.sites.filter(function (site) { return site.kind === "natural"; });
      }

      function siteById(id) {
        return map.sites.find(function (site) { return site.id === id; }) || null;
      }

      function currentLayout() {
        return map.layouts.find(function (layout) { return layout.id === selectedLayoutId; }) || map.layouts[0] || null;
      }

      function siteRadius(site) {
        return site.kind === "natural" ? EXPANSION_PROTECTION_RADIUS : PROTECTION_RADIUS;
      }

      function selectSite(id) {
        selectedSiteId = id;
        selectedTool = "base";
        syncToolButtons();
        refresh();
      }

      function normalizeId(value, fallback) {
        const id = String(value || "").trim().toLowerCase().replace(/[^a-z0-9_]+/g, "_").replace(/^_+|_+$/g, "");
        return id || fallback;
      }

      function mirroredTile(tile) {
        const size = map.terrain.length;
        if (selectedSymmetry === "left-right") return { x: size - 1 - tile.x, y: tile.y };
        if (selectedSymmetry === "top-bottom") return { x: tile.x, y: size - 1 - tile.y };
        if (selectedSymmetry === "radial") return { x: size - 1 - tile.x, y: size - 1 - tile.y };
        return null;
      }

      function sameTile(a, b) {
        return a && b && a.x === b.x && a.y === b.y;
      }

      function siteAt(tile) {
        return map.sites.find(function (site) { return site.x === tile.x && site.y === tile.y; }) || null;
      }

      function uniqueSiteId(base) {
        const stem = normalizeId(base, "site");
        let id = stem;
        let suffix = 2;
        while (siteById(id)) {
          id = stem + "_" + suffix;
          suffix++;
        }
        return id;
      }

      function cloneMirroredSite(site) {
        const target = mirroredTile(site);
        if (!target || sameTile(site, target)) return site;
        const occupant = siteAt(target);
        if (occupant) return occupant.kind === site.kind ? occupant : null;
        const mirrored = cloneSite(site);
        mirrored.id = uniqueSiteId(site.id + "_mirror");
        mirrored.x = target.x;
        mirrored.y = target.y;
        map.sites.push(mirrored);
        clearProtectedArea(mirrored);
        return mirrored;
      }

      function syncMirroredSlot(sourceSlot) {
        const layout = currentLayout();
        if (!layout) return true;
        const sourceMain = siteById(sourceSlot.main);
        if (!sourceMain) return false;
        const mirroredMain = cloneMirroredSite(sourceMain);
        if (!mirroredMain) return false;
        if (mirroredMain.id === sourceSlot.main) return true;

        const mirroredNaturals = [];
        for (const naturalId of sourceSlot.naturals) {
          const natural = siteById(naturalId);
          const mirroredNatural = natural && cloneMirroredSite(natural);
          if (!mirroredNatural) return false;
          mirroredNaturals.push(mirroredNatural.id);
        }

        const existing = layout.slots.find(function (slot) { return slot.main === mirroredMain.id; });
        if (existing) {
          existing.naturals = mirroredNaturals;
        } else {
          layout.slots.push({ main: mirroredMain.id, naturals: mirroredNaturals });
          layout.playerCount = layout.slots.length;
        }
        return true;
      }

      function syncMirroredSlotsForSite(siteId) {
        const layout = currentLayout();
        if (!layout) return true;
        const sourceSlots = layout.slots.filter(function (slot) {
          return slot.main === siteId || slot.naturals.includes(siteId);
        });
        for (const sourceSlot of sourceSlots) {
          if (!syncMirroredSlot(sourceSlot)) return false;
        }
        return true;
      }

      function syncMirroredSlotAfterLayoutEdit(slot) {
        return selectedSymmetry === "none" || syncMirroredSlot(slot);
      }

      function setSelectedSite(tile) {
        const site = siteById(selectedSiteId);
        if (!site) return false;
        const before = cloneMapState();
        const original = { x: site.x, y: site.y };
        const mirrorTarget = mirroredTile(tile);
        const existingMirror = mirrorTarget && !sameTile(original, mirroredTile(original))
          ? siteAt(mirroredTile(original))
          : null;
        const sourceOccupant = siteAt(tile);
        const mirrorOccupant = mirrorTarget ? siteAt(mirrorTarget) : null;
        const allowed = new Set([site.id]);
        if (existingMirror && existingMirror.kind === site.kind) allowed.add(existingMirror.id);
        if ((sourceOccupant && !allowed.has(sourceOccupant.id)) || (mirrorOccupant && !allowed.has(mirrorOccupant.id))) {
          setStatus("base sites cannot share a tile", true);
          return false;
        }

        site.x = tile.x;
        site.y = tile.y;
        clearProtectedArea(site);
        if (!mirrorTarget || sameTile(site, mirrorTarget)) return true;

        let mirrored = existingMirror && existingMirror.kind === site.kind ? existingMirror : null;
        if (!mirrored) {
          mirrored = cloneSite(site);
          mirrored.id = uniqueSiteId(site.id + "_mirror");
          map.sites.push(mirrored);
        }
        mirrored.x = mirrorTarget.x;
        mirrored.y = mirrorTarget.y;
        clearProtectedArea(mirrored);

        if (!syncMirroredSlotsForSite(site.id)) {
          map = before;
          setStatus("mirrored base overlaps a different site kind", true);
          return false;
        }
        return true;
      }

      function normalizeMap(raw) {
        const version = Number.isInteger(raw.version) ? raw.version : 0;
        if (version !== MAP_SCHEMA_VERSION) {
          throw new Error("map schema version " + version + " is not supported; editor requires version " + MAP_SCHEMA_VERSION);
        }
        const name = String(raw.name || "handcrafted-map");
        const description = String(raw.description || "");
        const design = String(raw._design || "");
        const rows = Array.isArray(raw.terrain) ? raw.terrain.map(String) : [];
        if (!rows.length) throw new Error("terrain must contain rows");
        const size = rows[0].length;
        if (size < MIN_SIZE || size > MAX_SIZE) throw new Error("size must be between " + MIN_SIZE + " and " + MAX_SIZE);
        if (rows.length !== size) throw new Error("terrain must be square");
        for (const pair of rows.entries()) {
          const y = pair[0];
          const row = pair[1];
          if (row.length !== size) throw new Error("row " + y + " has the wrong width");
          for (const ch of row) {
            if (ch !== "." && ch !== "#" && ch !== "~") throw new Error("unknown terrain character " + ch);
          }
        }
        if (!Array.isArray(raw.sites) || raw.sites.length === 0) throw new Error("sites must contain entries");
        const seenIds = new Set();
        const seenCoords = new Set();
        const sites = raw.sites.map(function (site, i) {
          const id = normalizeId(site.id, "site_" + (i + 1));
          const kind = site.kind === "natural" ? "natural" : site.kind === "main" ? "main" : null;
          const x = Number(site.x);
          const y = Number(site.y);
          if (!kind) throw new Error("sites[" + i + "] kind must be main or natural");
          if (seenIds.has(id)) throw new Error("duplicate site id " + id);
          seenIds.add(id);
          const key = x + "," + y;
          if (seenCoords.has(key)) throw new Error("duplicate site coordinate " + key);
          seenCoords.add(key);
          if (!Number.isInteger(x) || !Number.isInteger(y)) throw new Error("sites[" + i + "] must use integer coordinates");
          if (x < 0 || y < 0 || x >= size || y >= size) throw new Error("sites[" + i + "] is outside the map");
          return { id: id, kind: kind, x: x, y: y };
        });
        const mainIds = new Set(sites.filter(function (site) { return site.kind === "main"; }).map(function (site) { return site.id; }));
        const naturalIds = new Set(sites.filter(function (site) { return site.kind === "natural"; }).map(function (site) { return site.id; }));
        if (!mainIds.size || !naturalIds.size) throw new Error("map needs at least one main and one natural site");
        if (!Array.isArray(raw.layouts) || raw.layouts.length === 0) throw new Error("layouts must contain entries");
        const seenLayouts = new Set();
        const layouts = raw.layouts.map(function (layout, i) {
          const id = normalizeId(layout.id, "layout_" + (i + 1));
          if (seenLayouts.has(id)) throw new Error("duplicate layout id " + id);
          seenLayouts.add(id);
          const playerCount = Number(layout.playerCount);
          if (!Number.isInteger(playerCount) || playerCount < 1) throw new Error("layout " + id + " has invalid playerCount");
          const slots = Array.isArray(layout.slots) ? layout.slots.map(function (slot, slotIndex) {
            if (!mainIds.has(slot.main)) throw new Error("layout " + id + " slot " + slotIndex + " references missing main " + slot.main);
            const slotNaturals = normalizeSlotNaturals(slot, "layout " + id + " slot " + slotIndex);
            for (const natural of slotNaturals) {
              if (!naturalIds.has(natural)) throw new Error("layout " + id + " slot " + slotIndex + " references missing natural " + natural);
            }
            return { main: slot.main, naturals: slotNaturals };
          }) : [];
          if (slots.length !== playerCount) throw new Error("layout " + id + " slot count must match playerCount");
          validateUniqueSlots(id, slots);
          return { id: id, playerCount: playerCount, slots: slots };
        });
        return { version: version, name: name, description: description, _design: design, terrain: rows, sites: sites, layouts: layouts };
      }

      function normalizeSlotNaturals(slot, label) {
        const raw = Array.isArray(slot.naturals) ? slot.naturals : slot.natural ? [slot.natural] : [];
        const out = [];
        const seen = new Set();
        for (const value of raw) {
          const id = String(value || "").trim();
          if (!id) continue;
          if (seen.has(id)) throw new Error(label + " repeats natural " + id);
          seen.add(id);
          out.push(id);
        }
        if (!out.length) throw new Error(label + " needs at least one natural");
        if (out.length > NATURALS_PER_SLOT) throw new Error(label + " supports at most " + NATURALS_PER_SLOT + " naturals");
        return out;
      }

      function validateUniqueSlots(layoutId, slots) {
        const usedMains = new Set();
        const usedNaturals = new Set();
        for (const slot of slots) {
          if (usedMains.has(slot.main)) throw new Error("layout " + layoutId + " assigns main " + slot.main + " more than once");
          usedMains.add(slot.main);
          for (const natural of slot.naturals) {
            if (usedNaturals.has(natural)) throw new Error("layout " + layoutId + " assigns natural " + natural + " more than once");
            usedNaturals.add(natural);
          }
        }
      }

      function setStatus(text, bad) {
        statusEl.textContent = text;
        statusEl.classList.toggle("bad", !!bad);
      }

      function renderBuiltInMapSelect() {
        builtInMapSelect.replaceChildren();
        for (const entry of builtInMaps) {
          const opt = document.createElement("option");
          opt.value = entry.file;
          opt.textContent = entry.name;
          opt.title = entry.description || entry.name;
          builtInMapSelect.appendChild(opt);
        }
        builtInMapSelect.value = currentBuiltInFile;
      }

      async function loadMapUrl(url, label) {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error("HTTP " + response.status);
        map = normalizeMap(await response.json());
        selectedSiteId = map.sites[0].id;
        selectedLayoutId = map.layouts[0].id;
        map.sites.forEach(clearProtectedArea);
        refresh();
        setStatus("loaded " + label);
      }

      async function loadBuiltInMap(file) {
        const entry = builtInMaps.find(function (mapEntry) { return mapEntry.file === file; }) || null;
        currentBuiltInFile = file;
        renderBuiltInMapSelect();
        try {
          await loadMapUrl("/maps/" + encodeURIComponent(file), entry ? entry.name : file);
        } catch (err) {
          setStatus("map fetch failed: " + err.message, true);
        }
      }

      async function loadMapCatalog() {
        try {
          const response = await fetch(MAP_CATALOG_URL, { cache: "no-store" });
          if (!response.ok) throw new Error("HTTP " + response.status);
          const data = await response.json();
          const maps = Array.isArray(data.maps) ? data.maps.filter(function (entry) {
            return entry && typeof entry.file === "string" && entry.file.endsWith(".json");
          }) : [];
          if (maps.length) builtInMaps = maps;
        } catch (err) {
          setStatus("map catalog unavailable; using fallback list", true);
        }
        renderBuiltInMapSelect();
      }

      function terrainAt(x, y) {
        return map.terrain[y][x];
      }

      function setTerrainAt(x, y, ch) {
        const row = map.terrain[y];
        map.terrain[y] = row.slice(0, x) + ch + row.slice(x + 1);
      }

      function isProtected(x, y) {
        return map.sites.some(function (site) {
          const r = siteRadius(site);
          return Math.abs(site.x - x) <= r && Math.abs(site.y - y) <= r;
        });
      }

      function clearProtectedArea(site) {
        const r = siteRadius(site);
        for (let y = site.y - r; y <= site.y + r; y++) {
          for (let x = site.x - r; x <= site.x + r; x++) {
            if (x >= 0 && y >= 0 && x < map.terrain.length && y < map.terrain.length) setTerrainAt(x, y, TERRAIN.grass);
          }
        }
      }

      function symmetricTiles(tiles) {
        const unique = new Map();
        for (const tile of tiles) {
          unique.set(tile.x + "," + tile.y, tile);
          const mirrored = mirroredTile(tile);
          if (mirrored) unique.set(mirrored.x + "," + mirrored.y, mirrored);
        }
        return Array.from(unique.values());
      }

      function applyTerrain(tiles, ch) {
        const targets = symmetricTiles(tiles);
        if (ch !== TERRAIN.grass && targets.some(function (tile) { return isProtected(tile.x, tile.y); })) {
          setStatus("protected base zones must stay grass", true);
          return false;
        }
        for (const tile of targets) setTerrainAt(tile.x, tile.y, ch);
        return true;
      }

      function validationErrors() {
        const errors = [];
        const size = map.terrain.length;
        const seenCoords = new Set();
        for (const site of map.sites) {
          const key = site.x + "," + site.y;
          if (seenCoords.has(key)) errors.push("duplicate site coordinate " + key);
          seenCoords.add(key);
          const r = siteRadius(site);
          if (site.x < r || site.y < r || site.x >= size - r || site.y >= size - r) errors.push(site.id + " too close to edge");
          for (let y = site.y - r; y <= site.y + r; y++) {
            for (let x = site.x - r; x <= site.x + r; x++) {
              if (x < 0 || y < 0 || x >= size || y >= size) continue;
              if (terrainAt(x, y) !== TERRAIN.grass) {
                errors.push(site.id + " protected zone blocked");
                y = site.y + r + 1;
                break;
              }
            }
          }
        }
        const mainIds = new Set(mains().map(function (site) { return site.id; }));
        const naturalIds = new Set(naturals().map(function (site) { return site.id; }));
        for (const layout of map.layouts) {
          if (layout.slots.length !== layout.playerCount) errors.push(layout.id + " slot count mismatch");
          const usedMains = new Set();
          const usedNaturals = new Set();
          for (const slot of layout.slots) {
            if (!mainIds.has(slot.main)) errors.push(layout.id + " missing main " + slot.main);
            if (usedMains.has(slot.main)) errors.push(layout.id + " repeats main " + slot.main);
            usedMains.add(slot.main);
            if (!Array.isArray(slot.naturals) || slot.naturals.length < 1) errors.push(layout.id + " slot missing natural");
            if (slot.naturals.length > NATURALS_PER_SLOT) errors.push(layout.id + " slot has too many naturals");
            for (const natural of slot.naturals) {
              if (!naturalIds.has(natural)) errors.push(layout.id + " missing natural " + natural);
              if (usedNaturals.has(natural)) errors.push(layout.id + " repeats natural " + natural);
              usedNaturals.add(natural);
            }
          }
        }
        return errors;
      }

      function updateStatus() {
        const errors = validationErrors();
        setStatus(errors.length ? errors[0] : map.terrain.length + "x" + map.terrain.length + " valid", errors.length > 0);
      }

      function draw() {
        const size = map.terrain.length;
        cellSize = Math.max(6, Math.min(12, Math.floor(920 / size)));
        canvas.width = size * cellSize;
        canvas.height = size * cellSize;

        for (let y = 0; y < size; y++) {
          for (let x = 0; x < size; x++) {
            ctx.fillStyle = COLORS[terrainAt(x, y)];
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
          }
        }

        ctx.strokeStyle = COLORS.grid;
        ctx.lineWidth = 1;
        for (let i = 0; i <= size; i++) {
          const p = i * cellSize + 0.5;
          ctx.beginPath();
          ctx.moveTo(p, 0);
          ctx.lineTo(p, canvas.height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, p);
          ctx.lineTo(canvas.width, p);
          ctx.stroke();
        }

        drawSymmetryGuide();

        for (const site of map.sites) {
          const r = siteRadius(site);
          const x = (site.x - r) * cellSize;
          const y = (site.y - r) * cellSize;
          const w = (r * 2 + 1) * cellSize;
          ctx.fillStyle = COLORS.protect;
          ctx.fillRect(x, y, w, w);
          ctx.strokeStyle = COLORS.protectEdge;
          ctx.strokeRect(x + 0.5, y + 0.5, w - 1, w - 1);
        }

        const layout = currentLayout();
        if (layout) {
          ctx.strokeStyle = COLORS.pairLine;
          ctx.lineWidth = 2;
          for (const slot of layout.slots) {
            const main = siteById(slot.main);
            if (!main) continue;
            for (const naturalId of slot.naturals) {
              const natural = siteById(naturalId);
              if (!natural) continue;
              ctx.beginPath();
              ctx.moveTo(main.x * cellSize + cellSize / 2, main.y * cellSize + cellSize / 2);
              ctx.lineTo(natural.x * cellSize + cellSize / 2, natural.y * cellSize + cellSize / 2);
              ctx.stroke();
            }
          }
        }

        const mainIds = mains().map(function (site) { return site.id; });
        const naturalIds = naturals().map(function (site) { return site.id; });
        for (const site of map.sites) {
          const cx = site.x * cellSize + cellSize / 2;
          const cy = site.y * cellSize + cellSize / 2;
          const radius = Math.max(5, cellSize * 0.58);
          const isMain = site.kind === "main";
          const index = (isMain ? mainIds : naturalIds).indexOf(site.id) + 1;
          ctx.fillStyle = isMain ? COLORS.start : COLORS.expansion;
          ctx.strokeStyle = site.id === selectedSiteId ? "#ffffff" : "#11110f";
          ctx.lineWidth = site.id === selectedSiteId ? 3 : 2;
          ctx.beginPath();
          ctx.arc(cx, cy, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = COLORS.baseText;
          ctx.font = "700 " + Math.max(10, Math.floor(cellSize * 0.95)) + "px " + getComputedStyle(document.body).fontFamily;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText((isMain ? "M" : "N") + index, cx, cy + 0.5);
        }

        if (pointerDown && selectedMode === "box" && selectedTool !== "base" && dragStartTile && dragPreviewTile) {
          const rect = tileRect(dragStartTile, dragPreviewTile);
          drawPreviewRect(rect);
          const mirroredStart = mirroredTile(dragStartTile);
          const mirroredEnd = mirroredTile(dragPreviewTile);
          if (mirroredStart && mirroredEnd) drawPreviewRect(tileRect(mirroredStart, mirroredEnd));
        }

      }

      function renderBaseList() {
        pairListEl.replaceChildren();
        naturalListEl.replaceChildren();
        const layout = currentLayout();
        const layoutSelect = document.createElement("select");
        layoutSelect.setAttribute("aria-label", "Spawn layout");
        for (const entry of map.layouts) {
          const opt = document.createElement("option");
          opt.value = entry.id;
          opt.textContent = entry.id + " (" + entry.playerCount + "p)";
          layoutSelect.appendChild(opt);
        }
        layoutSelect.value = layout ? layout.id : "";
        layoutSelect.addEventListener("change", function (event) {
          selectedLayoutId = event.target.value;
          refresh();
        });
        pairListEl.appendChild(layoutSelect);

        if (layout) {
          layout.slots.forEach(function (slot, i) {
            const row = document.createElement("div");
            row.className = "base-row pair-row";
            const mainOptions = mains().map(function (site) {
              return '<option value="' + site.id + '"' + (slot.main === site.id ? ' selected' : '') + '>' + site.id + '</option>';
            }).join("");
            const naturalSummary = slot.naturals.join(", ");
            const naturalSelects = Array.from({ length: NATURALS_PER_SLOT }, function (_, naturalIndex) {
              const selected = slot.naturals[naturalIndex] || "";
              const blank = naturalIndex === 0 ? "" : '<option value="">None</option>';
              const options = naturals().map(function (site) {
                return '<option value="' + site.id + '"' + (selected === site.id ? ' selected' : '') + '>' + site.id + '</option>';
              }).join("");
              return '<select aria-label="Natural ' + (naturalIndex + 1) + ' for slot ' + (i + 1) + '" data-natural-index="' + naturalIndex + '">' + blank + options + '</select>';
            }).join("");
            row.innerHTML = '<span><span class="base-name">Slot ' + (i + 1) + '</span><span class="base-kind">' + slot.main + ' -> ' + naturalSummary + '</span></span><span><select aria-label="Main for slot ' + (i + 1) + '">' + mainOptions + '</select>' + naturalSelects + '</span>';
            const selects = row.querySelectorAll("select");
            selects[0].addEventListener("change", function (event) {
              const before = cloneMapState();
              slot.main = event.target.value;
              const synced = syncMirroredSlotAfterLayoutEdit(slot);
              if (!synced) map = before;
              refresh();
              if (!synced) setStatus("mirrored base overlaps a different site kind", true);
            });
            selects.forEach(function (select, selectIndex) {
              if (selectIndex === 0) return;
              select.addEventListener("change", function (event) {
                const before = cloneMapState();
                const next = slot.naturals.slice();
                const naturalIndex = Number(event.target.dataset.naturalIndex);
                if (event.target.value) next[naturalIndex] = event.target.value; else next.splice(naturalIndex, 1);
                slot.naturals = next.filter(function (value, index, values) {
                  return value && values.indexOf(value) === index;
                });
                const synced = syncMirroredSlotAfterLayoutEdit(slot);
                if (!synced) map = before;
                refresh();
                if (!synced) setStatus("mirrored base overlaps a different site kind", true);
              });
            });
            pairListEl.appendChild(row);
          });
        }

        map.sites.forEach(function (site) {
          const row = document.createElement("button");
          row.type = "button";
          row.className = "base-row" + (selectedSiteId === site.id ? " active" : "");
          row.innerHTML = '<span><span class="base-name">' + site.id + '</span><span class="base-kind">' + site.kind + '</span></span><span class="base-coord">' + site.x + ',' + site.y + '</span>';
          row.addEventListener("click", function () { selectSite(site.id); });
          naturalListEl.appendChild(row);
        });
      }

      function refresh() {
        mapNameEl.textContent = map.name;
        sizeInput.value = String(map.terrain.length);
        if (!siteById(selectedSiteId) && map.sites[0]) selectedSiteId = map.sites[0].id;
        if (!currentLayout() && map.layouts[0]) selectedLayoutId = map.layouts[0].id;
        renderBaseList();
        draw();
        updateStatus();
      }

      function syncToolButtons() {
        document.querySelectorAll("[data-tool]").forEach(function (button) {
          button.classList.toggle("active", button.dataset.tool === selectedTool);
        });
      }

      function syncModeButtons() {
        document.querySelectorAll("[data-mode]").forEach(function (button) {
          button.classList.toggle("active", button.dataset.mode === selectedMode);
        });
      }

      function syncSymmetryButtons() {
        document.querySelectorAll("[data-symmetry]").forEach(function (button) {
          button.classList.toggle("active", button.dataset.symmetry === selectedSymmetry);
        });
      }

      function canvasTile(event) {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((event.clientX - rect.left) / cellSize);
        const y = Math.floor((event.clientY - rect.top) / cellSize);
        const size = map.terrain.length;
        if (x < 0 || y < 0 || x >= size || y >= size) return null;
        return { x: x, y: y };
      }

      function tileRect(a, b) {
        const x0 = Math.min(a.x, b.x);
        const y0 = Math.min(a.y, b.y);
        const x1 = Math.max(a.x, b.x);
        const y1 = Math.max(a.y, b.y);
        return { x0: x0, y0: y0, x1: x1, y1: y1, w: x1 - x0 + 1, h: y1 - y0 + 1 };
      }

      function drawPreviewRect(rect) {
        ctx.fillStyle = "rgba(199,208,122,0.12)";
        ctx.fillRect(rect.x0 * cellSize, rect.y0 * cellSize, rect.w * cellSize, rect.h * cellSize);
        ctx.strokeStyle = "#e7dfc5";
        ctx.lineWidth = 2;
        ctx.strokeRect(rect.x0 * cellSize + 1, rect.y0 * cellSize + 1, rect.w * cellSize - 2, rect.h * cellSize - 2);
      }

      function drawSymmetryGuide() {
        if (selectedSymmetry === "none") return;
        const center = canvas.width / 2;
        ctx.save();
        ctx.strokeStyle = COLORS.symmetry;
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 4]);
        if (selectedSymmetry === "left-right" || selectedSymmetry === "radial") {
          ctx.beginPath();
          ctx.moveTo(center, 0);
          ctx.lineTo(center, canvas.height);
          ctx.stroke();
        }
        if (selectedSymmetry === "top-bottom" || selectedSymmetry === "radial") {
          ctx.beginPath();
          ctx.moveTo(0, center);
          ctx.lineTo(canvas.width, center);
          ctx.stroke();
        }
        ctx.restore();
      }

      function applyTool(tile) {
        if (!tile) return;
        if (selectedTool === "base") {
          if (setSelectedSite(tile)) refresh();
          return;
        }
        const ch = TERRAIN[selectedTool];
        if (!ch) return;
        if (!applyTerrain([tile], ch)) return;
        draw();
        updateStatus();
      }

      function applyBox(a, b) {
        if (!a || !b || selectedTool === "base") return;
        const ch = TERRAIN[selectedTool];
        if (!ch) return;
        const rect = tileRect(a, b);
        const tiles = [];
        for (let y = rect.y0; y <= rect.y1; y++) {
          for (let x = rect.x0; x <= rect.x1; x++) {
            tiles.push({ x: x, y: y });
          }
        }
        if (!applyTerrain(tiles, ch)) return;
        draw();
        updateStatus();
      }

      function resizeMap(nextSize) {
        const size = Math.max(MIN_SIZE, Math.min(MAX_SIZE, nextSize));
        const oldSize = map.terrain.length;
        const rows = [];
        for (let y = 0; y < size; y++) {
          let row = "";
          for (let x = 0; x < size; x++) row += x < oldSize && y < oldSize ? terrainAt(x, y) : TERRAIN.grass;
          rows.push(row);
        }
        map.terrain = rows;
        map.sites.forEach(function (site) {
          const r = siteRadius(site);
          site.x = Math.max(r, Math.min(size - r - 1, site.x));
          site.y = Math.max(r, Math.min(size - r - 1, site.y));
        });
        map.sites.forEach(clearProtectedArea);
        refresh();
      }

      async function loadDefault() {
        try {
          currentBuiltInFile = "default-handcrafted.json";
          renderBuiltInMapSelect();
          await loadMapUrl(DEFAULT_MAP_URL, "Default");
        } catch (err) {
          map = fallbackMap();
          selectedSiteId = map.sites[0].id;
          selectedLayoutId = map.layouts[0].id;
          refresh();
          setStatus("default fetch failed: " + err.message, true);
        }
      }

      function payload() {
        return {
          version: MAP_SCHEMA_VERSION,
          name: map.name || "handcrafted-map",
          description: map.description || "",
          _design: map._design || "",
          terrain: map.terrain,
          sites: map.sites.map(cloneSite),
          layouts: map.layouts.map(cloneLayout),
        };
      }

      function saveMap() {
        const errors = validationErrors();
        if (errors.length) { setStatus(errors[0], true); return; }
        const out = payload();
        const blob = new Blob([JSON.stringify(out, null, 2) + "\n"], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = (out.name || "map") + ".json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(link.href);
      }

      async function saveMapAs() {
        const errors = validationErrors();
        if (errors.length) { setStatus(errors[0], true); return; }
        const suggested = map.name || "handcrafted-map";
        const raw = window.prompt("Save map as (lowercase letters, digits, hyphens):", suggested);
        if (raw === null) return;
        const name = raw.trim().toLowerCase().replace(/[^a-z0-9-]/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "");
        if (!name) { setStatus("invalid name", true); return; }
        const out = payload();
        out.name = name;
        try {
          setStatus("saving...");
          const resp = await fetch("/maps/save", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: name, payload: out }),
          });
          if (!resp.ok) { setStatus("save failed: " + await resp.text(), true); return; }
          map.name = name;
          refresh();
          setStatus("saved as " + name + ".json");
        } catch (err) {
          setStatus("save error: " + err.message, true);
        }
      }

      document.getElementById("tools").addEventListener("click", function (event) {
        const button = event.target.closest("[data-tool]");
        if (!button) return;
        selectedTool = button.dataset.tool;
        syncToolButtons();
      });
      document.getElementById("modes").addEventListener("click", function (event) {
        const button = event.target.closest("[data-mode]");
        if (!button) return;
        selectedMode = button.dataset.mode;
        syncModeButtons();
      });
      document.getElementById("symmetry-modes").addEventListener("click", function (event) {
        const button = event.target.closest("[data-symmetry]");
        if (!button) return;
        selectedSymmetry = button.dataset.symmetry;
        syncSymmetryButtons();
        draw();
      });
      canvas.addEventListener("pointerdown", function (event) {
        const tile = canvasTile(event);
        if (!tile) return;
        pointerDown = true;
        dragStartTile = tile;
        dragPreviewTile = tile;
        canvas.setPointerCapture(event.pointerId);
        if (selectedTool === "base" || selectedMode === "paint") applyTool(tile); else draw();
      });
      canvas.addEventListener("pointermove", function (event) {
        if (!pointerDown || selectedTool === "base") return;
        const tile = canvasTile(event);
        if (!tile) return;
        dragPreviewTile = tile;
        selectedMode === "paint" ? applyTool(tile) : draw();
      });
      canvas.addEventListener("pointerup", function () {
        if (selectedMode === "box" && selectedTool !== "base") applyBox(dragStartTile, dragPreviewTile);
        pointerDown = false;
        dragStartTile = null;
        dragPreviewTile = null;
      });
      canvas.addEventListener("pointercancel", function () {
        pointerDown = false;
        dragStartTile = null;
        dragPreviewTile = null;
        draw();
      });
      document.getElementById("load-file").addEventListener("click", function () { fileInput.click(); });
      fileInput.addEventListener("change", async function () {
        const file = fileInput.files && fileInput.files[0];
        if (!file) return;
        try {
          map = normalizeMap(JSON.parse(await file.text()));
          selectedSiteId = map.sites[0].id;
          selectedLayoutId = map.layouts[0].id;
          map.sites.forEach(clearProtectedArea);
          refresh();
        } catch (err) {
          setStatus(err.message, true);
        } finally {
          fileInput.value = "";
        }
      });
      builtInMapSelect.addEventListener("change", function (event) { loadBuiltInMap(event.target.value); });
      document.getElementById("save-file").addEventListener("click", saveMap);
      document.getElementById("save-as-file").addEventListener("click", saveMapAs);
      document.getElementById("reset-map").addEventListener("click", loadDefault);
      document.getElementById("resize-map").addEventListener("click", function () { resizeMap(Number(sizeInput.value)); });

      syncToolButtons();
      syncModeButtons();
      syncSymmetryButtons();
      renderBuiltInMapSelect();
      loadMapCatalog();
      loadDefault();
    </script>
  </body>
</html>
