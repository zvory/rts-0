<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Design Lab</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
  </head>
  <body class="unit-lab-body">
    <main class="unit-lab-shell">
      <section class="unit-lab-stage" aria-label="Unit preview">
        <canvas id="unit-lab-canvas" width="1280" height="760"></canvas>
      </section>
      <aside class="unit-lab-panel" aria-label="Unit design browser">
        <header>
          <h1>Unit Design Lab</h1>
          <p id="unit-lab-status">Ready</p>
        </header>
        <button id="unit-lab-refresh" class="btn">Refresh</button>
        <section class="unit-lab-history" aria-label="Generation files">
          <h2>Generations</h2>
          <div id="unit-lab-tree"></div>
        </section>
        <section class="unit-lab-details" aria-label="Current design">
          <h2 id="unit-lab-name">No attempt selected</h2>
          <p id="unit-lab-role"></p>
          <p id="unit-lab-source"></p>
          <p id="unit-lab-prompt"></p>
          <ul id="unit-lab-notes"></ul>
        </section>
      </aside>
    </main>
    <script type="module" src="/unit-lab.js"></script>
  </body>
</html>
