<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Design Lab</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
  </head>
  <body class="unit-lab-body">
    <main class="unit-lab-shell">
      <section class="unit-lab-stage" aria-label="Unit preview">
        <canvas id="unit-lab-canvas" width="1280" height="760"></canvas>
      </section>
      <aside class="unit-lab-panel" aria-label="Unit design controls">
        <header>
          <h1>Unit Design Lab</h1>
          <p id="unit-lab-status">Ready</p>
        </header>
        <label>
          Base
          <select id="unit-lab-base">
            <option value="new unit">New unit</option>
            <option value="worker">Worker</option>
            <option value="rifleman">Rifleman</option>
            <option value="machine_gunner">Machine Gunner</option>
            <option value="anti_tank_gun">Anti-Tank Gun</option>
            <option value="mortar_team">Mortar Team</option>
            <option value="scout_car">Scout Car</option>
            <option value="tank">Tank</option>
            <option value="command_car">Command Car</option>
          </select>
        </label>
        <label>
          Prompt
          <textarea id="unit-lab-prompt" rows="7" maxlength="2000" spellcheck="true">fast scout vehicle, boxy field silhouette, clear forward-facing weapon, muted olive armor, readable at small size</textarea>
        </label>
        <button id="unit-lab-generate" class="btn primary">Generate</button>
        <section class="unit-lab-details" aria-label="Current design">
          <h2 id="unit-lab-name">No attempt selected</h2>
          <p id="unit-lab-role"></p>
          <p id="unit-lab-source"></p>
          <ul id="unit-lab-notes"></ul>
        </section>
        <section class="unit-lab-history" aria-label="Version history">
          <h2>Versions</h2>
          <div id="unit-lab-attempts"></div>
        </section>
      </aside>
    </main>
    <script type="module" src="/unit-lab.js"></script>
  </body>
</html>
