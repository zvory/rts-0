app = "rts-0-zvorygin"
primary_region = "ewr"
kill_signal = "SIGINT"
kill_timeout = 300

[build]
  dockerfile = "Dockerfile"

[env]
  RTS_ADDR = "0.0.0.0:8080"
  RUST_LOG = "info"
  RTS_PERF = "spikes"
  RTS_PERF_SLOW_TICK_MS = "40"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 4
  memory = "1gb"
